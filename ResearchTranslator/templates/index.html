<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Paper Translator to LaTeX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="container">
    <h1>Research Paper → LaTeX PDF</h1>
    <p class="subtitle">Detect document elements (title/heading/list/paragraph), convert to LaTeX, and render the resulting PDF.</p>

    <section class="panel">
      <form id="translate-form">
        <label for="paper">Research paper (PDF)</label>
        <input id="paper" name="paper" type="file" accept="application/pdf" required />

        <label for="targetLanguage">Target language</label>
        <select id="targetLanguage" name="targetLanguage" required>
          <option value="" disabled selected>Select a language</option>
          {% for code, name in languages.items() %}
          <option value="{{ code }}">{{ name }}</option>
          {% endfor %}
        </select>

        <button id="translate-btn" type="submit">Generate LaTeX + PDF</button>
      </form>
    </section>

    <section class="panel hidden" id="actions-panel">
      <button id="download-pdf-btn" type="button">Download Generated PDF</button>
      <button id="download-tex-btn" type="button">Download .tex</button>
      <button id="copy-tex-btn" type="button">Copy LaTeX</button>
    </section>

    <section class="panel hidden" id="latex-panel">
      <h2>Generated LaTeX Code</h2>
      <textarea id="latex-output" readonly></textarea>
    </section>

    <section class="panel hidden" id="preview-panel">
      <h2>Generated PDF Preview</h2>
      <iframe id="pdf-preview" title="Generated PDF Preview"></iframe>
    </section>

    <p id="status" role="status" aria-live="polite"></p>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
