<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcadLy - Learning Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(147, 51, 234, 0.4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(147, 51, 234, 0.8); }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px -5px rgba(147, 51, 234, 0.4);
            border-color: rgba(147, 51, 234, 0.5);
        }

        /* View Transitions */
        .view-window {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.5s ease-in-out;
        }
        .view-a-active { transform: translateX(0); opacity: 1; }
        .view-a-hidden { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .view-b-active { transform: translateX(0); opacity: 1; }
        .view-b-hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

        /* Path Nodes */
        .path-line {
            position: absolute;
            top: 50%;
            left: 4rem;
            width: 212rem; /* Enough length to connect all items */
            height: 4px;
            background: linear-gradient(90deg, #22d3ee 35%, #334155 35%);
            transform: translateY(-5px);
            z-index: 0;
            transition: background 1s ease;
        }

        .node-btn {
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }
        
        /* Node states */
        .node-completed {
            background: #0f172a;
            border-color: #22d3ee;
            color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
        }
        .node-active {
            background: #0f172a;
            border-color: #9333ea;
            color: #9333ea;
            animation: pulse-purple 2s infinite;
        }
        .node-locked {
            background: #1e293b;
            border-color: #334155;
            color: #64748b;
            cursor: not-allowed;
        }
        .node-ai {
            background: #0f172a;
            border-color: #f59e0b;
            color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            animation: float 3s ease-in-out infinite;
        }
        .node-boss {
            background: #0f172a;
            border-color: #22d3ee;
            color: #22d3ee;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.8), inset 0 0 15px rgba(34, 211, 238, 0.4);
            transform: scale(1.2);
        }

        @keyframes pulse-purple {
            0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(147, 51, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Modal / Side Panel */
        .content-panel {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }
        .panel-hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
        .panel-visible { transform: translateY(0); opacity: 1; pointer-events: auto; }
        
        /* Quiz option hover */
        .quiz-opt { transition: all 0.2s; }
        .quiz-opt:hover:not(.selected) { background: rgba(147, 51, 234, 0.1); border-color: rgba(147, 51, 234, 0.5); }
        .quiz-opt.selected { background: #9333ea; border-color: #9333ea; color: white; }

        /* Stagger Nodes */
        .node-btn:nth-of-type(odd) { margin-top: -6rem; }
        .node-btn:nth-of-type(even) { margin-top: 6rem; }
        #node-10 { margin-top: 0 !important; }

        /* Light Theme Overrides */
        body.light-theme { background-color: #f8fafc; color: #0f172a; }
        body.light-theme .glass { background: rgba(255, 255, 255, 0.7); border-color: rgba(0, 0, 0, 0.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        body.light-theme .text-slate-200, body.light-theme .text-slate-300, body.light-theme .text-slate-400, body.light-theme p.text-slate-400 { color: #475569 !important; }
        body.light-theme h1, body.light-theme h2, body.light-theme h3, body.light-theme .text-white { color: #0f172a !important; }
        body.light-theme .node-locked { background: #e2e8f0; border-color: #cbd5e1; color: #64748b; }
        body.light-theme .node-completed, body.light-theme .node-active, body.light-theme .node-ai, body.light-theme .node-boss { background: #ffffff; }
        body.light-theme #contentPanelOverlay { background: rgba(255,255,255,0.7); }
        body.light-theme #contentPanel { box-shadow: 0 -10px 40px rgba(0,0,0,0.1); background: rgba(255,255,255,0.95); }
        body.light-theme .bg-slate-900\/60, body.light-theme .bg-slate-900\/50, body.light-theme .bg-slate-900\/40, body.light-theme .bg-slate-800\/50 { background: #f1f5f9; border-color: #cbd5e1 !important; }
        body.light-theme .bg-slate-900, body.light-theme .bg-slate-800\/80, body.light-theme .bg-slate-800\/40, body.light-theme .bg-slate-800 { background: #ffffff; border-color: #e2e8f0 !important; }
        body.light-theme .border-white\/10, body.light-theme .border-white\/5 { border-color: rgba(0,0,0,0.1) !important; }
        
        body.light-theme #gradStop2 { stop-color: #cbd5e1; }
        body.light-theme .bg-black\/60 { background: #e2e8f0; }
        body.light-theme .prose-invert { color: #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 overflow-hidden h-screen w-screen relative">


    <!-- Background Accents -->
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-purple-900/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[40%] h-[50%] rounded-full bg-cyan-900/20 blur-[120px] pointer-events-none z-0"></div>

    <!-- VIEW A: THE MODULE GRID -->
    <main id="viewA" class="view-window view-a-active flex flex-col pt-16 px-8 md:px-20 z-10 overflow-auto">
        <header class="mb-12 max-w-6xl mx-auto w-full flex justify-between items-start md:items-center">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-cyan-400 inline-block mb-4">
                    Explore Modules
                </h1>
                <p class="text-slate-400 text-lg">Select a discipline to begin your journey.</p>
            </div>
            <!-- Theme Toggle for View A -->
            <button onclick="toggleTheme()" class="theme-btn w-12 h-12 shrink-0 rounded-full glass flex items-center justify-center text-xl text-yellow-400 hover:scale-110 transition-transform shadow-[0_0_15px_rgba(250,204,21,0.2)]">
                <i class="fa-solid fa-sun theme-icon"></i>
            </button>
        </header>

        <section class="max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
            <!-- Module Card 1 -->
            <button onclick="navigateToViewB('System Design')" class="text-left w-full h-48 glass rounded-2xl p-6 card-hover flex flex-col justify-between group outline-none focus:ring-2 focus:ring-emerald-500">
                <div class="w-12 h-12 rounded-xl bg-emerald-500/20 flex items-center justify-center text-emerald-400 text-2xl group-hover:bg-emerald-500/40 transition-colors">
                    <i class="fa-solid fa-network-wired"></i>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-white mb-2">System Design</h3>
                    <p class="text-sm text-slate-400">Scalable architectures, distributed systems, and microservices patterns.</p>
                </div>
            </button>
            
            <!-- Module Card 2 -->
            <button onclick="navigateToViewB('Data Structures & Algorithms')" class="text-left w-full h-48 glass rounded-2xl p-6 card-hover flex flex-col justify-between group outline-none focus:ring-2 focus:ring-purple-500">
                <div class="w-12 h-12 rounded-xl bg-purple-500/20 flex items-center justify-center text-purple-400 text-2xl group-hover:bg-purple-500/40 transition-colors">
                    <i class="fa-solid fa-code"></i>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-white mb-2">DSA</h3>
                    <p class="text-sm text-slate-400">Master data structures, algorithms, graph theory, and dynamic programming.</p>
                </div>
            </button>
            
            <!-- Module Card 3 -->
            <button onclick="navigateToViewB('Python Programming')" class="text-left w-full h-48 glass rounded-2xl p-6 card-hover flex flex-col justify-between group outline-none focus:ring-2 focus:ring-amber-500">
                <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center text-amber-400 text-2xl group-hover:bg-amber-500/40 transition-colors">
                    <i class="fa-brands fa-python"></i>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-white mb-2">Python Programming</h3>
                    <p class="text-sm text-slate-400">From basic syntax to advanced decorators and standard libraries.</p>
                </div>
            </button>
            
            <!-- Module Card 4 -->
            <button onclick="navigateToViewB('University Physics')" class="text-left w-full h-48 glass rounded-2xl p-6 card-hover flex flex-col justify-between group outline-none focus:ring-2 focus:ring-cyan-500">
                <div class="w-12 h-12 rounded-xl bg-cyan-500/20 flex items-center justify-center text-cyan-400 text-2xl group-hover:bg-cyan-500/40 transition-colors">
                    <i class="fa-solid fa-atom"></i>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-white mb-2">University Physics</h3>
                    <p class="text-sm text-slate-400">Classical mechanics, electromagnetism, and modern physics principles.</p>
                </div>
            </button>

            <!-- Module Card 5 -->
            <button onclick="navigateToViewB('Maths 1 (Calculus)')" class="text-left w-full h-48 glass rounded-2xl p-6 card-hover flex flex-col justify-between group outline-none focus:ring-2 focus:ring-rose-500">
                <div class="w-12 h-12 rounded-xl bg-rose-500/20 flex items-center justify-center text-rose-400 text-2xl group-hover:bg-rose-500/40 transition-colors">
                    <i class="fa-solid fa-bezier-curve"></i>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-white mb-2">Maths 1 (Calculus)</h3>
                    <p class="text-sm text-slate-400">Limits, derivatives, integrals, and their applications in engineering.</p>
                </div>
            </button>

            <!-- Module Card 6 -->
            <button onclick="navigateToViewB('Maths 2 (Linear Algebra)')" class="text-left w-full h-48 glass rounded-2xl p-6 card-hover flex flex-col justify-between group outline-none focus:ring-2 focus:ring-indigo-500">
                <div class="w-12 h-12 rounded-xl bg-indigo-500/20 flex items-center justify-center text-indigo-400 text-2xl group-hover:bg-indigo-500/40 transition-colors">
                    <i class="fa-solid fa-square-root-variable"></i>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-white mb-2">Maths 2 (Linear Algebra)</h3>
                    <p class="text-sm text-slate-400">Matrices, vector spaces, eigenvalues, and multi-variable calculus.</p>
                </div>
            </button>
        </section>
    </main>

    <!-- VIEW B: THE LEARNING PATH -->
    <main id="viewB" class="view-window view-b-hidden flex flex-col z-10 h-full">
        <!-- Top Nav -->
        <nav class="glass px-8 py-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-6">
                <button onclick="navigateToViewA()" class="text-slate-400 hover:text-white flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i> <span>Back to Modules</span>
                </button>
                <div class="h-6 w-px bg-slate-700"></div>
                <h2 id="courseHeaderTitle" class="text-xl font-semibold text-purple-400">Course Title</h2>
            </div>
            <div class="flex items-center gap-4">
                <!-- Theme Toggle for View B -->
                <button onclick="toggleTheme()" class="theme-btn w-10 h-10 shrink-0 rounded-full glass flex items-center justify-center text-lg text-yellow-400 hover:scale-110 transition-transform shadow-[0_0_15px_rgba(250,204,21,0.2)]">
                    <i class="fa-solid fa-sun theme-icon"></i>
                </button>
                <div class="text-sm text-slate-400 bg-slate-800/50 px-4 py-1.5 rounded-full border border-slate-700">
                    <i class="fa-solid fa-bolt text-amber-400 mr-2"></i> 400 XP
                </div>
            </div>
        </nav>

        <!-- Horizontal Map -->
        <div class="flex-1 w-full overflow-x-auto overflow-y-hidden relative flex items-center hide-scroll">
            <div class="min-w-max px-20 flex items-center gap-24 relative h-full">
                <!-- Curve connecting nodes -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" id="pathSvg">
                    <defs>
                        <linearGradient id="pathGradient" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="35%" stop-color="#22d3ee" id="gradStop1"></stop>
                            <stop offset="35%" stop-color="#334155" id="gradStop2"></stop>
                        </linearGradient>
                    </defs>
                    <path id="curvePath" fill="none" stroke="url(#pathGradient)" stroke-width="4"></path>
                </svg>

                <!-- Node 1 (Completed) -->
                <button onclick="openPanel('standard', 1, 'Introduction & Concepts')" class="node-btn node-completed w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group">
                    <i class="fa-solid fa-check"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-300 group-hover:text-white">1. Intro</span>
                </button>
                
                <!-- Node 2 (Completed) -->
                <button onclick="openPanel('standard', 2, 'Core Methodologies')" class="node-btn node-completed w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group">
                    <i class="fa-solid fa-check"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-300 group-hover:text-white">2. Methods</span>
                </button>

                <!-- Node 3 (Completed) -->
                <button onclick="openPanel('standard', 3, 'Practical Application I')" class="node-btn node-completed w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group">
                    <i class="fa-solid fa-check"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-300 group-hover:text-white">3. Practice I</span>
                </button>

                <!-- Node 4 (Active Pulsing) -->
                <button onclick="openPanel('standard', 4, 'Advanced Theories')" class="node-btn node-active w-20 h-20 rounded-full border-2 flex items-center justify-center text-2xl outline-none shrink-0 group">
                    <i class="fa-solid fa-play ml-1"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-200">4. Theories</span>
                </button>

                <!-- Node 5 (AI Checkpoint) -->
                <button onclick="openPanel('ai', 5, 'AI Checkpoint')" class="node-btn node-ai w-16 h-16 rounded-xl border-2 flex items-center justify-center text-2xl outline-none shrink-0 group rotate-45 hover:scale-110 transition-transform">
                    <i class="fa-solid fa-robot -rotate-45"></i>
                    <span class="absolute -bottom-10 -left-6 whitespace-nowrap text-sm font-bold text-amber-400 tracking-wider -rotate-45">CHECKPOINT</span>
                </button>

                <!-- Node 6 (Locked initially) -->
                <button id="node-6" onclick="openPanel('standard', 6, 'Practical Application II')" class="node-btn node-locked w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group" disabled>
                    <i class="fa-solid fa-lock"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-500">6. Practice II</span>
                </button>

                <!-- Node 7 (Locked) -->
                <button id="node-7" class="node-btn node-locked w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group" disabled>
                    <i class="fa-solid fa-lock"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-500">7. Case Study</span>
                </button>

                <!-- Node 8 (Locked) -->
                <button id="node-8" class="node-btn node-locked w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group" disabled>
                    <i class="fa-solid fa-lock"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-500">8. Deep Dive</span>
                </button>

                <!-- Node 9 (Locked) -->
                <button id="node-9" class="node-btn node-locked w-16 h-16 rounded-full border-2 flex items-center justify-center text-xl outline-none shrink-0 group" disabled>
                    <i class="fa-solid fa-lock"></i>
                    <span class="absolute -bottom-8 whitespace-nowrap text-sm font-medium text-slate-500">9. Synthesis</span>
                </button>

                <!-- Node 10 (Boss Fight) -->
                <button id="node-10" onclick="openPanel('boss', 10, 'Final Mock Test')" class="node-btn node-locked w-24 h-24 rounded-full border-4 flex items-center justify-center text-4xl outline-none shrink-0 group mx-8" disabled>
                    <i class="fa-solid fa-crown text-slate-600" id="boss-icon"></i>
                    <span class="absolute -bottom-10 whitespace-nowrap text-lg font-bold text-slate-600 uppercase tracking-widest" id="boss-text">Final Test</span>
                </button>
            </div>
        </div>
    </main>

    <!-- CONTENT PANEL (Modal/Sliding Drawer) -->
    <div id="contentPanelOverlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 panel-hidden" onclick="closePanel(event)">
        <div id="contentPanel" class="absolute bottom-0 left-0 w-full h-[85vh] md:h-[90vh] glass rounded-t-3xl border-b-0 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col pt-2" onclick="event.stopPropagation()">
            
            <!-- Drag Handle / Header -->
            <div class="w-full flex justify-between items-center px-8 py-4 border-b border-white/10 shrink-0">
                <div class="flex items-center gap-4">
                    <div id="panelNodeBadge" class="w-10 h-10 rounded-full bg-slate-800 border-2 border-slate-600 flex items-center justify-center font-bold">4</div>
                    <h3 id="panelTitle" class="text-2xl font-semibold text-white">Advanced Theories</h3>
                </div>
                <button onclick="closePanel()" class="text-slate-400 hover:text-white p-2 text-2xl outline-none transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Dynamic Content Area -->
            <div id="panelBody" class="flex-1 overflow-y-auto w-full p-6 md:p-12 relative">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // ----------------------------------------
        // View Transitions & Navigation
        // ----------------------------------------
        const viewA = document.getElementById('viewA');
        const viewB = document.getElementById('viewB');
        const courseHeaderTitle = document.getElementById('courseHeaderTitle');

        function navigateToViewB(courseName) {
            courseHeaderTitle.textContent = courseName;
            
            // Slide A out, B in
            viewA.classList.remove('view-a-active');
            viewA.classList.add('view-a-hidden');
            
            viewB.classList.remove('view-b-hidden');
            viewB.classList.add('view-b-active');

            setTimeout(drawCurvyLine, 100);
            setTimeout(drawCurvyLine, 300); // multiple checks for transition flow
        }

        function navigateToViewA() {
            // Slide B out, A in
            viewB.classList.remove('view-b-active');
            viewB.classList.add('view-b-hidden');
            
            viewA.classList.remove('view-a-hidden');
            viewA.classList.add('view-a-active');
        }

        // ----------------------------------------
        // Content Panel Logic
        // ----------------------------------------
        const panelOverlay = document.getElementById('contentPanelOverlay');
        const panelTitle = document.getElementById('panelTitle');
        const panelNodeBadge = document.getElementById('panelNodeBadge');
        const panelBody = document.getElementById('panelBody');
        
        // Track Node 6 lock state natively
        let isNode6Unlocked = false;

        function openPanel(type, nodeNumber, title) {
            // Setup header
            panelNodeBadge.textContent = nodeNumber;
            panelTitle.textContent = title;
            
            // Set badge styling based on type
            panelNodeBadge.className = 'w-10 h-10 rounded-full flex items-center justify-center font-bold border-2 ' + 
                (type === 'standard' ? 'bg-slate-800 border-purple-500 text-purple-400' :
                 type === 'ai' ? 'bg-slate-800 border-amber-500 text-amber-400 rounded-xl rotate-45 [&>span]:-rotate-45' : 
                 'bg-slate-800 border-cyan-400 text-cyan-400');
            
            if (type === 'ai') {
                panelNodeBadge.innerHTML = '<span>' + nodeNumber + '</span>';
            }

            // Clear previous body
            panelBody.innerHTML = '';
            
            // Render specific content
            if (type === 'standard') {
                renderStandardContent();
            } else if (type === 'ai') {
                renderAIContent();
            } else if (type === 'boss') {
                renderBossContent();
            }

            // Show Panel
            panelOverlay.classList.remove('panel-hidden');
            panelOverlay.classList.add('panel-visible');
        }

        function closePanel(e) {
            // If e is passed, ensure clicking overlay background closes it (onClick on overlay div handles this)
            panelOverlay.classList.remove('panel-visible');
            panelOverlay.classList.add('panel-hidden');
        }

        // ----------------------------------------
        // Render Functions for Panel Content
        // ----------------------------------------

        function renderStandardContent() {
            panelBody.innerHTML = `
                <div class="max-w-4xl mx-auto flex flex-col gap-8">
                    <!-- Video Player Placeholder -->
                    <div class="w-full aspect-video bg-black/60 rounded-2xl border border-white/10 flex flex-col items-center justify-center group relative overflow-hidden cursor-pointer">
                        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=1600" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:opacity-60 transition-opacity blur-[2px]" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        <div class="w-20 h-20 rounded-full bg-purple-600/80 backdrop-blur border border-white/20 flex items-center justify-center text-3xl text-white group-hover:scale-110 group-hover:bg-purple-500 transition-all z-10 shadow-[0_0_30px_rgba(147,51,234,0.5)]">
                            <i class="fa-solid fa-play ml-2"></i>
                        </div>
                        <div class="absolute bottom-6 left-8 z-10">
                            <h4 class="text-xl font-semibold mb-1">Module Overview</h4>
                            <p class="text-slate-300 text-sm">12:45 • High Quality</p>

            const icons = document.querySelectorAll('.theme-icon');

                    btn.classList.remove('shadow-[0_0_15px_rgba(250,204,21,0.2)]', 'text-yellow-400');
                });

                btns.forEach(btn => {
                    btn.classList.add('shadow-[0_0_15px_rgba(250,204,21,0.2)]');

            }

        function drawCurvyLine() {
            const nodes = document.querySelectorAll('.node-btn');
            const path = document.getElementById('curvePath');
            if (nodes.length === 0 || !path) return;
            
            // Re-calc curve logic
            let d = "";
            nodes.forEach((node, i) => {
                // Determine exact pixel coords of node center
                // Notice: offsetTop and offsetLeft are fully relative to .min-w-max which is the identical parent for the SVG
                const x = node.offsetLeft + node.offsetWidth / 2;
                const y = node.offsetTop + node.offsetHeight / 2;
                
                if (i === 0) {
                    d += `M ${x} ${y} `;
                } else {
                    const prev = nodes[i-1];
                    const prevX = prev.offsetLeft + prev.offsetWidth / 2;
                    const prevY = prev.offsetTop + prev.offsetHeight / 2;
                    
                    // Smooth curve using cubic bezier control points via midpoints
                    const midX = (prevX + x) / 2;
                    d += `C ${midX} ${prevY}, ${midX} ${y}, ${x} ${y} `;
                }
            });
            path.setAttribute('d', d);
        }

        // Initialize SVG curves
        window.addEventListener('load', () => { setTimeout(drawCurvyLine, 100); });
        window.addEventListener('resize', drawCurvyLine);
        
        // Redraw on transition end to ensure proper calculations during animation
        document.getElementById('viewB').addEventListener('transitionend', drawCurvyLine);
