version: "3.9"

services:
  acadly-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acadly-app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      MONGO_URI: mongodb://mongo:27017/acadly_videos
      AI_BACKEND_OUTPUT_DIR: /app/AI Backend/outputs
    ports:
      - "3000:3000"
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: acadly-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-acadly_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: acadly-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
