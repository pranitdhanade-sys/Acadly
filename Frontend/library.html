<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acadly PDF Hub</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        background: #f4f7fb;
        color: #111827;
      }

      header {
        background: #0f172a;
        color: #fff;
        padding: 1rem 1.5rem;
      }

      header h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      main {
        max-width: 1100px;
        margin: 1.5rem auto;
        padding: 0 1rem 2rem;
      }

      #status {
        margin-bottom: 1rem;
        font-size: 0.95rem;
      }

      .actions {
        margin-bottom: 1rem;
      }

      button {
        background: #1d4ed8;
        color: #fff;
        border: 0;
        border-radius: 0.4rem;
        padding: 0.6rem 1rem;
        cursor: pointer;
        font-size: 0.9rem;
      }

      button:hover {
        background: #1e40af;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1rem;
      }

      .card {
        background: #fff;
        border-radius: 0.8rem;
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
        padding: 0.9rem;
      }

      .card h2 {
        font-size: 1rem;
        margin: 0 0 0.6rem;
      }

      .preview {
        width: 100%;
        height: 220px;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
      }

      .open-link {
        display: inline-block;
        margin-top: 0.7rem;
        color: #1d4ed8;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>PDF Hub</h1>
    </header>

    <main>
      <p id="status">Loading PDF library...</p>
      <div class="actions">
        <button id="refreshButton" type="button">Refresh from /pdfs folder</button>
      </div>
      <section id="pdfGrid" class="grid"></section>
    </main>

    <script src="/library.js"></script>
  </body>
</html>
