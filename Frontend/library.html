<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acadly PDF Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="CSS/library.css">
    
  </head>
  <body>
    <header>
      <h1>PDF Hub</h1>
    </header>

    <main>
      <p id="status">Loading PDF library...</p>
      <div class="actions">
        <button id="refreshButton" type="button">Refresh from /pdfs folder</button>
      </div>
      <section id="pdfGrid" class="grid"></section>
    </main>

    <script src="library.js"></script>
  </body>
</html>
