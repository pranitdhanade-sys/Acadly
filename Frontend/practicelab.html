<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Practice The Lab (PTL)</title>
<link rel="stylesheet" href="CSS/practicelab.css">

</head>
<body>

<div class="container">
  <h2>Practice Lab</h2>

  <label>Subject</label>
  <select id="subject">
    <option>Physics</option>
    <option>Chemistry</option>
    <option>Mathematics</option>
    <option>Computer Science</option>
  </select>

  <label>Class</label>
  <select id="class">
    <option>Class 8</option>
    <option>Class 9</option>
    <option>Class 10</option>
    <option>Class 11</option>
    <option>Class 12</option>
  </select>

  <label>Topic</label>
  <select id="topic"></select>

  <label>Number of Questions</label>
  <input type="range" min="5" max="50" value="10" id="questions">
  <div class="range-value" id="qValue">10</div>

  <label>Difficulty</label>
  <div class="toggle" id="difficulty">
    <button type="button" data-level="easy">Easy</button>
    <button type="button" data-level="medium" class="active">Medium</button>
    <button type="button" data-level="hard">Hard</button>
  </div>

  <label>Timer</label>
  <select id="timer">
    <option value="0">No Timer</option>
    <option value="600">10 min</option>
    <option value="1800">30 min</option>
    <option value="3600">60 min</option>
  </select>

  <button class="start" onclick="startLab()">Start Practice</button>

  <div id="testArea" hidden>
    <div id="testMeta" class="meta"></div>
    <div id="questionsList"></div>
  </div>
</div>

<script>
let difficulty = 'medium';

const qSlider = document.getElementById('questions');
const qValue = document.getElementById('qValue');
const difficultyButtons = document.querySelectorAll('#difficulty button');

const topicCatalog = {
  Physics: ["All Topics", "Gravity", "Thermodynamics", "Electricity"],
  Chemistry: ["All Topics", "Organic Chemistry", "Inorganic Chemistry"],
  Mathematics: ["All Topics", "Algebra"],
  "Computer Science": ["All Topics", "Data Structures"],
};

const subjectSelect = document.getElementById('subject');
const topicSelect = document.getElementById('topic');

function refreshTopics() {
  const topics = topicCatalog[subjectSelect.value] || ["All Topics"];
  topicSelect.innerHTML = topics.map((topic) => `<option>${topic}</option>`).join('');
}

subjectSelect.addEventListener('change', refreshTopics);
refreshTopics();

qSlider.oninput = () => {
  qValue.textContent = qSlider.value;
};

difficultyButtons.forEach((button) => {
  button.addEventListener('click', () => {
    difficulty = button.dataset.level;
    difficultyButtons.forEach((btn) => btn.classList.remove('active'));
    button.classList.add('active');
  });
});

function renderTest(data) {
  const testArea = document.getElementById('testArea');
  const testMeta = document.getElementById('testMeta');
  const list = document.getElementById('questionsList');

  testArea.hidden = false;
  testMeta.textContent = `Generated ${data.generatedCount} of ${data.totalAvailable} available question(s).`;

  list.innerHTML = '';

  data.questions.forEach((question, index) => {
    const card = document.createElement('div');
    card.className = 'question-card';

    const options = Array.isArray(question.options)
      ? question.options.map((option) => `<li>${option}</li>`).join('')
      : '<li>No options available</li>';

    card.innerHTML = `
      <h4>Q${index + 1}. ${question.question || 'Untitled question'}</h4>
      <ul>${options}</ul>
    `;

    list.appendChild(card);
  });
}

function startLab() {
  const config = {
    subject: document.getElementById('subject').value,
    class: document.getElementById('class').value,
    topic: document.getElementById('topic').value,
    questions: qSlider.value,
    difficulty,
    timer: document.getElementById('timer').value
  };

  fetch('/api/start-lab', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(config)
  })
    .then((res) => {
      if (!res.ok) {
        return res.json().then((payload) => {
          throw new Error(payload.error || 'Could not start lab.');
        });
      }

      return res.json();
    })
    .then((data) => {
      renderTest(data);
    })
      .catch((err) => {
        alert(err.message);
        console.error(err);
      });
    }
  </script>
  
  </body>
  </html>
    <section class="hero">
      <h1>Practice The Lab (PTL)</h1>
      <p>
        CTF-style practical missions for Docker, Kubernetes, database operations, and ROS2.
        Pick a machine, spawn your lab, solve objectives, and submit the flag.
      </p>
    </section>

    <section class="toolbar">
      <input id="search" placeholder="Search by machine, tag, or keyword" />
      <select id="track">
        <option value="all">All Tracks</option>
        <option value="docker">Docker</option>
        <option value="kubernetes">Kubernetes</option>
        <option value="database">Database</option>
        <option value="ros2">ROS2</option>
      </select>
      <select id="difficulty">
        <option value="all">All Difficulties</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button class="primary" id="refresh" type="button">Refresh Machines</button>
    </section>

    <section class="grid" id="machineGrid"></section>

    <section class="panel-wrap" id="panelWrap" hidden>
      <article class="lab-panel" id="labPanel"></article>
    </section>
  </main>

<script>
  const grid = document.getElementById('machineGrid');
  const panelWrap = document.getElementById('panelWrap');
  const labPanel = document.getElementById('labPanel');

  const searchInput = document.getElementById('search');
  const trackSelect = document.getElementById('track');
  const difficultySelect = document.getElementById('difficulty');
  const refreshButton = document.getElementById('refresh');

  let currentSession = null;

  async function fetchMachines() {
    const params = new URLSearchParams({
      search: searchInput.value.trim(),
      track: trackSelect.value,
      difficulty: difficultySelect.value,
    });

    const response = await fetch(`/api/ptl/machines?${params.toString()}`);
    if (!response.ok) throw new Error('Could not load machines right now.');
    return response.json();
  }

  function renderMachines(payload) {
    if (!payload.machines.length) {
      grid.innerHTML = '<p class="muted">No machine matched this filter.</p>';
      return;
    }

    grid.innerHTML = payload.machines.map((machine) => `
      <article class="machine">
        <span class="pill">${machine.track}</span>
        <h3>${machine.name}</h3>
        <p>${machine.description}</p>
        <div class="meta">
          <span class="pill">${machine.difficulty}</span>
          <span class="pill">${machine.points} pts</span>
          <span class="pill">Solve rate: ${machine.solveRate}</span>
          <span class="pill">${machine.duration}</span>
        </div>
        <div class="meta">
          ${machine.tags.map((tag) => `<span class="pill">#${tag}</span>`).join('')}
        </div>
        <button class="primary" type="button" onclick="startMachine('${machine.id}')">Start Machine</button>
      </article>
    `).join('');
  }

  async function loadMachines() {
    try {
      const payload = await fetchMachines();
      renderMachines(payload);
    } catch (error) {
      grid.innerHTML = `<p>${error.message}</p>`;
    }
  }

  async function startMachine(machineId) {
    try {
      const response = await fetch('/api/ptl/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machineId }),
      });

      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || 'Unable to start machine.');

      currentSession = payload.instanceId;
      panelWrap.hidden = false;

      labPanel.innerHTML = `
        <h2>Active Session: ${payload.machine.name}</h2>
        <p class="muted">Instance <strong>${payload.instanceId}</strong> • Expires in ${payload.expiresIn}</p>
        <ul>
          ${payload.machine.objectives.map((item) => `<li>${item}</li>`).join('')}
        </ul>
        <div class="connection">
          <strong>Connection:</strong> ${payload.connection.protocol}<br />
          <strong>Endpoint:</strong> ${payload.connection.endpoint}<br />
          <strong>User:</strong> ${payload.connection.username}<br />
          <strong>Password:</strong> ${payload.connection.password}<br />
          <span class="muted">Flag format: PTL{...}</span>
        </div>
        <div class="flag-box">
          <input id="flagInput" placeholder="Submit captured flag" />
          <button class="primary" type="button" onclick="submitFlag()">Submit Flag</button>
        </div>
        <div id="status" class="muted"></div>
      `;
    } catch (error) {
      alert(error.message);
    }
  }

  async function submitFlag() {
    const flagInput = document.getElementById('flagInput');
    const status = document.getElementById('status');

    if (!flagInput || !currentSession) return;

    try {
      const response = await fetch('/api/ptl/submit-flag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          instanceId: currentSession,
          flag: flagInput.value,
        }),
      });

      const payload = await response.json();
      if (!response.ok) throw new Error(payload.message || payload.error || 'Submission failed.');

      status.textContent = `${payload.message} +${payload.reward} XP`;
      status.className = 'ok';
      currentSession = null;
      flagInput.value = '';
    } catch (error) {
      status.textContent = error.message;
      status.className = 'muted';
    }
  }

  refreshButton.addEventListener('click', loadMachines);
  searchInput.addEventListener('input', loadMachines);
  trackSelect.addEventListener('change', loadMachines);
  difficultySelect.addEventListener('change', loadMachines);

  loadMachines();
  window.startMachine = startMachine;
  window.submitFlag = submitFlag;
</script>
</body>
</html>
