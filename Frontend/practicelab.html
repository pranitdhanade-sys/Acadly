<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Lab</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.05);
  --accent: #6366f1;
  --text: #e2e8f0;
}

body {
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle, #0f172a, #020617);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:30px 16px;
}

.container {
  width:min(700px, 100%);
  padding:25px;
  border-radius:20px;
  background:var(--card);
  backdrop-filter: blur(20px);
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

label {
  font-size:0.9rem;
  opacity:0.8;
}

select, input[type=range] {
  width:100%;
  margin:8px 0 15px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

.range-value {
  text-align:right;
  font-size:0.8rem;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e293b;
  color:white;
}

button:hover {
  background:var(--accent);
}

.toggle {
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  gap: 10px;
}

.toggle button {
  flex: 1;
}

.toggle button.active {
  background:var(--accent);
}

.start {
  margin-top:10px;
  background:var(--accent);
  width:100%;
}

#testArea {
  margin-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.15);
  padding-top: 16px;
}

.question-card {
  background: rgba(15,23,42,0.8);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.question-card h4 {
  margin: 0 0 8px;
  font-size: 1rem;
}

.question-card ul {
  margin: 0;
  padding-left: 18px;
}

.meta {
  font-size: 0.8rem;
  opacity: 0.8;
  margin-bottom: 12px;
}

.labs-preview {
  margin-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.15);
  padding-top: 16px;
}

.labs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
}

.lab-tile {
  background: rgba(15,23,42,0.8);
  border-radius: 10px;
  padding: 10px;
}

.lab-tile h4 {
  margin: 0 0 6px;
  font-size: 0.95rem;
}

.lab-tile p {
  margin: 0;
  font-size: 0.8rem;
  opacity: 0.85;
}

.labs-link {
  display: inline-block;
  margin-top: 10px;
  color: #a5b4fc;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>Practice Lab</h2>

  <label>Subject</label>
  <select id="subject">
    <option>Physics</option>
    <option>Chemistry</option>
    <option>Mathematics</option>
    <option>Computer Science</option>
  </select>

  <label>Class</label>
  <select id="class">
    <option>Class 8</option>
    <option>Class 9</option>
    <option>Class 10</option>
    <option>Class 11</option>
    <option>Class 12</option>
  </select>

  <label>Topic</label>
  <select id="topic">
    <option>All Topics</option>
    <option>Gravity</option>
    <option>Thermodynamics</option>
    <option>Organic Chemistry</option>
  </select>

  <label>Number of Questions</label>
  <input type="range" min="5" max="50" value="10" id="questions">
  <div class="range-value" id="qValue">10</div>

  <label>Difficulty</label>
  <div class="toggle" id="difficulty">
    <button type="button" data-level="easy">Easy</button>
    <button type="button" data-level="medium" class="active">Medium</button>
    <button type="button" data-level="hard">Hard</button>
  </div>

  <label>Timer</label>
  <select id="timer">
    <option value="0">No Timer</option>
    <option value="600">10 min</option>
    <option value="1800">30 min</option>
    <option value="3600">60 min</option>
  </select>

  <button class="start" onclick="startLab()">Start Practice</button>

  <div id="testArea" hidden>
    <div id="testMeta" class="meta"></div>
    <div id="questionsList"></div>
  </div>

  <div class="labs-preview">
    <h3>Command Learning Labs</h3>
    <div id="labsMeta" class="meta">Loading labs...</div>
    <div class="labs-grid" id="labsGrid"></div>
    <a class="labs-link" href="/practicallab">Open full Practical Labs page →</a>
  </div>
</div>

<script>
let difficulty = 'medium';

const qSlider = document.getElementById('questions');
const qValue = document.getElementById('qValue');
const difficultyButtons = document.querySelectorAll('#difficulty button');

qSlider.oninput = () => {
  qValue.textContent = qSlider.value;
};

difficultyButtons.forEach((button) => {
  button.addEventListener('click', () => {
    difficulty = button.dataset.level;
    difficultyButtons.forEach((btn) => btn.classList.remove('active'));
    button.classList.add('active');
  });
});

function renderTest(data) {
  const testArea = document.getElementById('testArea');
  const testMeta = document.getElementById('testMeta');
  const list = document.getElementById('questionsList');

  testArea.hidden = false;
  testMeta.textContent = `Generated ${data.generatedCount} of ${data.totalAvailable} available question(s).`;

  list.innerHTML = '';

  data.questions.forEach((question, index) => {
    const card = document.createElement('div');
    card.className = 'question-card';

    const options = Array.isArray(question.options)
      ? question.options.map((option) => `<li>${option}</li>`).join('')
      : '<li>No options available</li>';

    card.innerHTML = `
      <h4>Q${index + 1}. ${question.question || 'Untitled question'}</h4>
      <ul>${options}</ul>
    `;

    list.appendChild(card);
  });
}

function startLab() {
  const config = {
    subject: document.getElementById('subject').value,
    class: document.getElementById('class').value,
    topic: document.getElementById('topic').value,
    questions: qSlider.value,
    difficulty,
    timer: document.getElementById('timer').value
  };

  fetch('/api/start-lab', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(config)
  })
    .then((res) => {
      if (!res.ok) {
        return res.json().then((payload) => {
          throw new Error(payload.error || 'Could not start lab.');
        });
      }

      return res.json();
    })
    .then((data) => {
      renderTest(data);
    })
    .catch((err) => {
      alert(err.message);
      console.error(err);
    });
}

function loadLabsPreview() {
  const labsMeta = document.getElementById('labsMeta');
  const labsGrid = document.getElementById('labsGrid');

  fetch('/api/ptl/labs')
    .then((res) => res.json())
    .then((payload) => {
      const labs = Array.isArray(payload.labs) ? payload.labs : [];
      labsMeta.textContent = `${labs.length} practical lab(s) available.`;
      labsGrid.innerHTML = labs.slice(0, 6).map((lab) => `
        <div class="lab-tile">
          <h4>${lab.name}</h4>
          <p>${lab.track} • ${lab.level} • ${lab.taskCount} tasks</p>
        </div>
      `).join('');
    })
    .catch(() => {
      labsMeta.textContent = 'Could not load practical labs.';
      labsGrid.innerHTML = '';
    });
}

loadLabsPreview();
</script>

</body>
</html>
