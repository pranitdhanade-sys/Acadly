<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice The Lab (PTL) - Test Generator</title>
  <link rel="stylesheet" href="CSS/practicelab.css" />
</head>
<body>
  <div class="container">
    <h2>Practice Test Generator</h2>

    <label for="subject">Subject</label>
    <select id="subject">
      <option>Physics</option>
      <option>Chemistry</option>
      <option>Mathematics</option>
      <option>Computer Science</option>
    </select>

    <label for="class">Class</label>
    <select id="class">
      <option>Class 8</option>
      <option>Class 9</option>
      <option>Class 10</option>
      <option>Class 11</option>
      <option>Class 12</option>
    </select>

    <label for="topic">Topic</label>
    <select id="topic"></select>

    <label for="questions">Number of Questions</label>
    <input type="range" min="5" max="50" value="10" id="questions" />
    <div class="range-value" id="qValue">10</div>

    <label>Difficulty</label>
    <div class="toggle" id="difficulty">
      <button type="button" data-level="easy">Easy</button>
      <button type="button" data-level="medium" class="active">Medium</button>
      <button type="button" data-level="hard">Hard</button>
    </div>

    <label for="timer">Timer</label>
    <select id="timer">
      <option value="0">No Timer</option>
      <option value="600">10 min</option>
      <option value="1800">30 min</option>
      <option value="3600">60 min</option>
    </select>

    <button class="start" id="startBtn" type="button">Generate Test</button>

    <div id="testArea" hidden>
      <div id="testMeta" class="meta"></div>
      <div id="questionsList"></div>
    </div>
  </div>

  <script>
    let difficulty = "medium";

    const qSlider = document.getElementById("questions");
    const qValue = document.getElementById("qValue");
    const difficultyButtons = document.querySelectorAll("#difficulty button");
    const startButton = document.getElementById("startBtn");

    const topicCatalog = {
      Physics: ["All Topics", "Gravity", "Thermodynamics", "Electricity"],
      Chemistry: ["All Topics", "Organic Chemistry", "Inorganic Chemistry"],
      Mathematics: ["All Topics", "Algebra"],
      "Computer Science": ["All Topics", "Data Structures"],
    };

    const subjectSelect = document.getElementById("subject");
    const topicSelect = document.getElementById("topic");

    function refreshTopics() {
      const topics = topicCatalog[subjectSelect.value] || ["All Topics"];
      topicSelect.innerHTML = topics.map((topic) => `<option>${topic}</option>`).join("");
    }

    const SUBJECT_TOPIC_PATHS = {
      Physics: ["Gravity", "Thermodynamics", "Electricity"],
      Chemistry: ["Organic Chemistry", "Inorganic Chemistry"],
      Mathematics: ["Algebra"],
      "Computer Science": ["Data Structures"],
    };

    function normalizeQuestions(raw, meta = {}) {
      const source = Array.isArray(raw) ? raw : Array.isArray(raw?.questions) ? raw.questions : [];
      return source
        .filter((item) => item && (item.question || item.prompt))
        .map((item) => ({
          question: item.question || item.prompt,
          options: Array.isArray(item.options) ? item.options : [],
          answer: item.answer || item.correctAnswer || "",
          subject: meta.subject || item.subject || "",
          topic: meta.topic || item.topic || "",
          difficulty: meta.difficulty || item.difficulty || "",
        }));
    }

    async function loadTopicQuestions(subject, topic, difficulty) {
      const topicPath = encodeURIComponent(topic);
      const filePath = `../Questions/Subject/${encodeURIComponent(subject)}/${topicPath}/${difficulty}.json`;
      const response = await fetch(filePath);

      if (!response.ok) {
        throw new Error(`Question file missing: ${subject}/${topic}/${difficulty}.json`);
      }

      const payload = await response.json();
      return normalizeQuestions(payload, { subject, topic, difficulty });
    }

    async function generateTestFromQuestionFolder(config) {
      const isAllTopics = config.topic === "All Topics";
      const topics = isAllTopics
        ? SUBJECT_TOPIC_PATHS[config.subject] || []
        : [config.topic];

      const topicLoads = await Promise.allSettled(
        topics.map((topic) => loadTopicQuestions(config.subject, topic, config.difficulty))
      );

      const loadedQuestions = topicLoads
        .filter((entry) => entry.status === "fulfilled")
        .flatMap((entry) => entry.value);

      if (!loadedQuestions.length) {
        throw new Error(`No ${config.difficulty} questions found in Questions/Subject for your selection.`);
      }

      const randomized = shuffle(loadedQuestions);
      const generatedQuestions = randomized.slice(0, Number.parseInt(config.questions, 10) || 10);

      return {
        totalAvailable: loadedQuestions.length,
        generatedCount: generatedQuestions.length,
        questions: generatedQuestions,
      };
    }

    function renderTest(data) {
      const testArea = document.getElementById("testArea");
      const testMeta = document.getElementById("testMeta");
      const list = document.getElementById("questionsList");

      testArea.hidden = false;
      testMeta.textContent = `Generated ${data.generatedCount} of ${data.totalAvailable} available question(s).`;
      list.innerHTML = "";

      data.questions.forEach((question, index) => {
        const card = document.createElement("div");
        card.className = "question-card";

        const options = Array.isArray(question.options)
          ? question.options.map((option) => `<li>${option}</li>`).join("")
          : "<li>No options available</li>";

        card.innerHTML = `
          <h4>Q${index + 1}. ${question.question || "Untitled question"}</h4>
          <p><small>${question.subject || ""} • ${question.topic || ""} • ${question.difficulty || ""}</small></p>
          <ul>${options}</ul>
        `;

        list.appendChild(card);
      });
    }

    async function startLab() {
      const config = {
        subject: document.getElementById("subject").value,
        class: document.getElementById("class").value,
        topic: document.getElementById("topic").value,
        questions: qSlider.value,
        difficulty,
        timer: document.getElementById("timer").value,
      };

      startButton.disabled = true;
      startButton.textContent = "Generating...";

      try {
        let testPayload;
        try {
          const response = await fetch("/api/start-lab", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(config),
          });

          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || "Could not start lab.");
          testPayload = payload;
        } catch (apiError) {
          testPayload = await generateTestFromQuestionFolder(config);
        }

        renderTest(testPayload);
      } catch (error) {
        alert(error.message);
      } finally {
        startButton.disabled = false;
        startButton.textContent = "Generate Test";
      }
    }

    subjectSelect.addEventListener("change", refreshTopics);
    refreshTopics();

    qSlider.addEventListener("input", () => {
      qValue.textContent = qSlider.value;
    });

    function shuffle(array) {
      const cloned = [...array];
      for (let i = cloned.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        difficulty = button.dataset.level;
        difficultyButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
      });
    });

    startButton.addEventListener("click", startLab);
  </script>
</body>
</html>
