<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AcadLy — AI Learning Video Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/video-metadata.js"></script>
    <style>
      body {
        background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.2), transparent 55%), radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.18), transparent 55%), #020617;
      }
      .glass {
        background: linear-gradient(to bottom right, rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.65));
        backdrop-filter: blur(18px);
      }
      .settings-popover {
        opacity: 0;
        transform: translateY(6px) scale(0.96);
        pointer-events: none;
        transition: opacity 150ms ease, transform 150ms ease;
      }
      .settings-popover[data-open="true"] {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .playlist-item[data-active="true"] {
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.65), 0 0 22px rgba(56, 189, 248, 0.3);
      }
      #playerShell.floating {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        width: 360px;
        height: 202px;
        z-index: 50;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-6xl flex-col gap-6 px-4 py-6 lg:flex-row lg:py-10">
      <section class="glass relative flex-1 rounded-3xl border border-slate-700/70 p-4 shadow-2xl lg:p-6">
        <header class="mb-4 flex items-center justify-between gap-4">
          <div>
            <p class="text-xs uppercase tracking-[0.18em] text-cyan-300/80">AI Learning · Playlist</p>
            <h1 id="videoTitle" class="mt-1 text-lg font-semibold tracking-tight text-slate-50 sm:text-xl">Loading video…</h1>
            <p id="videoMeta" class="mt-1 text-xs text-slate-400">—</p>
          </div>
          <div class="flex items-center gap-2">
            <button id="btnMinimize" class="h-6 w-6 rounded-full bg-slate-900/80 text-[10px] text-slate-300 hover:bg-slate-800" title="Minimize player">_</button>
            <button id="btnFloat" class="h-6 w-6 rounded-full bg-slate-900/80 text-[10px] text-slate-300 hover:bg-slate-800" title="Toggle floating mini-player">⧉</button>
            <button id="btnClosePlayer" class="h-6 w-6 rounded-full bg-slate-900/80 text-[10px] text-red-300 hover:bg-red-600/70 hover:text-white" title="Close player">×</button>
          </div>
        </header>

        <div id="playerShell" class="relative aspect-video overflow-hidden rounded-2xl border border-slate-700/80">
          <video id="player" class="h-full w-full bg-black object-contain" preload="metadata"></video>

          <div id="quizOverlay" class="absolute inset-0 z-20 hidden items-center justify-center bg-black/70">
            <div class="w-full max-w-md rounded-2xl border border-cyan-400/40 bg-slate-900/95 p-4 text-sm text-slate-100 shadow-[0_0_40px_rgba(34,211,238,.45)]">
              <p class="text-xs font-semibold uppercase tracking-[0.16em] text-cyan-300">Quick check-in</p>
              <h3 id="quizQuestion" class="mt-1 text-sm font-semibold"></h3>
              <div id="quizOptions" class="mt-3 space-y-2"></div>
              <div id="quizMessage" class="mt-2 text-xs text-slate-300"></div>
              <div class="mt-4 flex items-center justify-between gap-2">
                <button id="quizSkip" type="button" class="rounded-full border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs text-slate-300">Skip for now</button>
                <button id="quizSubmit" type="button" class="rounded-full bg-cyan-500 px-4 py-1.5 text-xs font-semibold text-slate-900">Submit & continue</button>
              </div>
            </div>
          </div>

          <div class="pointer-events-none absolute inset-x-0 bottom-0 flex flex-col gap-2 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-3">
            <div class="pointer-events-auto flex items-center gap-2 text-[10px] text-slate-200">
              <span id="currentTime">00:00</span>
              <div class="relative flex-1">
                <div class="h-1.5 w-full rounded-full bg-slate-600/60">
                  <div id="progressBar" class="h-1.5 w-0 rounded-full bg-gradient-to-r from-cyan-400 to-violet-400"></div>
                </div>
                <input id="progressInput" type="range" min="0" max="100" value="0" class="absolute inset-0 h-1.5 w-full cursor-pointer opacity-0" />
              </div>
              <span id="duration">00:00</span>
            </div>

            <div class="pointer-events-auto flex items-center justify-between gap-2">
              <div class="flex items-center gap-2">
                <button id="btnPlayPause" class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-900 text-slate-50 ring-1 ring-cyan-400/60">
                  <span id="iconPlay">▶</span><span id="iconPause" class="hidden">❚❚</span>
                </button>
                <button id="btnBack10" class="h-9 w-9 rounded-full bg-slate-900/90 text-slate-200 ring-1 ring-slate-600/70">-10</button>
                <button id="btnFwd10" class="h-9 w-9 rounded-full bg-slate-900/90 text-slate-200 ring-1 ring-slate-600/70">+10</button>
                <button id="btnPrev" class="hidden h-9 rounded-full bg-slate-900/80 px-3 text-xs font-medium text-slate-100 ring-1 ring-slate-600/70 sm:flex sm:items-center">◀ Prev</button>
                <button id="btnNext" class="hidden h-9 rounded-full bg-slate-900/80 px-3 text-xs font-medium text-slate-100 ring-1 ring-slate-600/70 sm:flex sm:items-center">Next ▶</button>
              </div>

              <div class="flex items-center gap-2 text-xs">
                <button id="btnNotes" class="hidden h-9 rounded-full bg-slate-900/80 px-3 text-[11px] font-medium text-slate-100 ring-1 ring-slate-600/70 md:flex md:items-center">Notes</button>
                <button id="btnSpeed" class="hidden h-9 rounded-full bg-slate-900/80 px-3 font-medium text-slate-100 ring-1 ring-slate-600/70 sm:flex sm:items-center"><span id="speedLabel">1.0x</span></button>
                <div class="relative">
                  <button id="btnSettings" class="flex h-9 items-center gap-1 rounded-full bg-slate-900 px-3 text-[11px] font-medium text-slate-100 ring-1 ring-slate-600/80">Settings</button>
                  <div id="settingsMenu" class="settings-popover absolute bottom-11 right-0 w-56 rounded-2xl border border-slate-700/80 bg-slate-900/95 p-3 text-[11px] text-slate-200 shadow-2xl" data-open="false">
                    <div class="mb-2 text-[10px] uppercase tracking-[0.16em] text-slate-400">Player options</div>
                    <div class="space-y-2">
                      <div>
                        <div class="mb-1 flex items-center justify-between"><span>Subtitles</span><span id="subtitleLabel" class="text-slate-500">Off</span></div>
                        <div class="flex flex-wrap gap-1">
                          <button type="button" data-subtitle="off" class="subtitle-pill rounded-full bg-slate-800 px-2 py-1">Off</button>
                          <button type="button" data-subtitle="en" class="subtitle-pill rounded-full bg-slate-800 px-2 py-1">English</button>
                        </div>
                      </div>
                      <div>
                        <div class="mb-1">Playback speed</div>
                        <div class="flex flex-wrap gap-1">
                          <button type="button" data-speed="0.75" class="speed-pill rounded-full bg-slate-800 px-2 py-1">0.75x</button>
                          <button type="button" data-speed="1" class="speed-pill rounded-full bg-cyan-500/20 px-2 py-1 ring-1 ring-cyan-400/80">1.0x</button>
                          <button type="button" data-speed="1.5" class="speed-pill rounded-full bg-slate-800 px-2 py-1">1.5x</button>
                          <button type="button" data-speed="2" class="speed-pill rounded-full bg-slate-800 px-2 py-1">2.0x</button>
                        </div>
                      </div>
                      <div>
                        <div class="mb-1 flex items-center justify-between"><span>Quality</span><span id="qualityLabel" class="text-slate-500">Auto</span></div>
                        <div id="qualityPills" class="flex flex-wrap gap-1"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="glass flex w-full max-w-md flex-col rounded-3xl border border-slate-700/70 p-4 shadow-xl lg:w-80">
        <div class="mb-3">
          <div class="flex items-center justify-between gap-2">
            <p class="text-xs uppercase tracking-[0.18em] text-slate-400">Your AI learning queue</p>
            <!-- Filled by JS: shows "Live from DB" or "Demo mode" -->
            <span id="dbBadge" class="hidden rounded-full px-2 py-0.5 text-[10px] font-medium"></span>
          </div>
          <h2 class="text-sm font-semibold text-slate-100">
            Up next
            <span id="videoCount" class="ml-1 text-xs font-normal text-slate-500"></span>
          </h2>
        </div>
        <div id="playlist" class="flex-1 space-y-2 overflow-y-auto pr-1 text-sm"></div>
      </aside>
    </main>

    <aside id="notesDrawer" class="glass fixed bottom-4 right-4 z-30 flex w-80 translate-y-[130%] flex-col rounded-2xl border border-slate-700/70 p-3 text-xs text-slate-100 shadow-2xl transition-transform duration-300 ease-out">
      <div class="mb-2 flex items-center justify-between">
        <p id="notesTitle" class="text-[12px] font-semibold text-slate-50">Current video</p>
        <button id="notesClose" class="rounded-full p-1 text-slate-400 hover:bg-slate-800 hover:text-slate-100">✕</button>
      </div>
      <div id="notesList" class="max-h-52 space-y-2 overflow-y-auto pr-1 text-[11px] text-slate-200"></div>
    </aside>

    <script>
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

      const videoEl = $("#player");
      const titleEl = $("#videoTitle");
      const metaEl = $("#videoMeta");
      const currentTimeEl = $("#currentTime");
      const durationEl = $("#duration");
      const progressBar = $("#progressBar");
      const progressInput = $("#progressInput");
      const playlistEl = $("#playlist");
      const speedLabel = $("#speedLabel");
      const qualityLabel = $("#qualityLabel");
      const subtitleLabel = $("#subtitleLabel");
      const settingsMenu = $("#settingsMenu");
      const notesDrawer = $("#notesDrawer");
      const notesTitle = $("#notesTitle");
      const notesList = $("#notesList");
      const quizOverlay = $("#quizOverlay");
      const quizQuestion = $("#quizQuestion");
      const quizOptions = $("#quizOptions");
      const quizMessage = $("#quizMessage");

      const btnPlayPause = $("#btnPlayPause");
      const iconPlay = $("#iconPlay");
      const iconPause = $("#iconPause");
      const btnBack10 = $("#btnBack10");
      const btnFwd10 = $("#btnFwd10");
      const btnPrev = $("#btnPrev");
      const btnNext = $("#btnNext");
      const btnSettings = $("#btnSettings");
      const btnNotes = $("#btnNotes");
      const notesClose = $("#notesClose");
      const quizSkip = $("#quizSkip");
      const quizSubmit = $("#quizSubmit");
      const playerShell = $("#playerShell");
      const btnMinimize = $("#btnMinimize");
      const btnFloat = $("#btnFloat");
      const btnClosePlayer = $("#btnClosePlayer");

      let playlist = [];
      let currentIndex = 0;
      let currentVideo = null;
      let currentQuizSelection = null;

      // Shown when a video row in MySQL has no thumbnail URL
      const PLACEHOLDER_THUMB = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 56'%3E%3Crect width='80' height='56' fill='%231e293b'/%3E%3Ctext x='40' y='34' text-anchor='middle' fill='%2338bdf8' font-size='20' font-family='system-ui'%3E%E2%96%B6%3C/text%3E%3C/svg%3E";

      function formatTime(seconds) {
        if (!Number.isFinite(seconds)) return "00:00";
        const s = Math.floor(seconds % 60).toString().padStart(2, "0");
        const m = Math.floor(seconds / 60).toString().padStart(2, "0");
        return `${m}:${s}`;
      }

      function loadPlaylist() {
        const badge   = document.getElementById("dbBadge");
        const countEl = document.getElementById("videoCount");

        // Hardcoded playlist — always visible, no server needed
        playlist = [
          {
            id: 1,
            title: "Intro to Machine Learning",
            topic: "AI Foundations",
            duration: "12:34",
            quality: ["1080p", "720p", "480p"],
            playbackSpeeds: [0.75, 1, 1.25, 1.5, 2],
            src: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
            thumbnail: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?auto=compress&cs=tinysrgb&w=800",
            tracks: [{ kind: "subtitles", label: "English", srclang: "en",
              src: "https://gist.githubusercontent.com/benkules/0e9eafbd6f66a8d89f5cb9184160a95c/raw/sample-en.vtt",
              default: true }],
          },
          {
            id: 2,
            title: "Neural Networks Explained",
            topic: "Deep Learning",
            duration: "18:45",
            quality: ["1080p", "720p", "480p"],
            playbackSpeeds: [0.75, 1, 1.25, 1.5, 2],
            src: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm",
            thumbnail: "https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg?auto=compress&cs=tinysrgb&w=800",
            tracks: [],
          },
          {
            id: 3,
            title: "Computer Vision with CNNs",
            topic: "Computer Vision",
            duration: "23:15",
            quality: ["1080p", "720p", "480p"],
            playbackSpeeds: [0.75, 1, 1.25, 1.5, 2],
            src: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
            thumbnail: "https://images.pexels.com/photos/2599244/pexels-photo-2599244.jpeg?auto=compress&cs=tinysrgb&w=800",
            tracks: [],
          },
        ];

        if (badge) {
          badge.classList.remove("hidden");
          badge.textContent = "\u25cf Demo mode";
          badge.className   = "rounded-full px-2 py-0.5 text-[10px] font-medium bg-amber-500/20 text-amber-400 ring-1 ring-amber-500/30";
        }
        if (countEl) countEl.textContent = `(${playlist.length} videos)`;
        renderPlaylist();
        setVideoIndex(0);
      }

      function renderPlaylist() {
        playlistEl.innerHTML = "";
        playlist.forEach((v, idx) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "playlist-item relative flex w-full items-center gap-3 rounded-2xl border border-slate-700/80 bg-slate-900/60 p-2 text-left text-xs text-slate-200 transition";
          item.dataset.index = idx;
          item.innerHTML = `
            <div class="relative h-14 w-20 overflow-hidden rounded-xl border border-slate-700/90">
              <img src="${v.thumbnail || PLACEHOLDER_THUMB}" alt="" class="h-full w-full object-cover" />
            </div>
            <div class="min-w-0 flex-1">
              <p class="truncate text-[13px] font-semibold">${v.title}</p>
              <p class="mt-0.5 truncate text-[11px] text-slate-400">${v.topic || ""}</p>
            </div>
          `;
          // If the thumbnail URL is broken/unreachable, show the placeholder icon
          const img = item.querySelector("img");
          if (img) img.onerror = () => { img.src = PLACEHOLDER_THUMB; };
          item.addEventListener("click", () => setVideoIndex(idx, true));
          playlistEl.appendChild(item);
        });
      }

      function setVideoIndex(index, autoplay = false) {
        if (index < 0 || index >= playlist.length) return;
        currentIndex = index;
        currentVideo = playlist[index];

        $$(".playlist-item", playlistEl).forEach((el) => {
          el.dataset.active = String(Number(el.dataset.index) === index);
        });

        titleEl.textContent = currentVideo.title;
        metaEl.textContent = `${currentVideo.topic || "AI Learning"} • ${currentVideo.duration || ""}`;

        while (videoEl.firstChild) videoEl.removeChild(videoEl.firstChild);
        const source = document.createElement("source");
        // Strip query params before checking extension (e.g. video.mp4?token=abc)
        const rawSrc     = currentVideo.src || "";
        const srcForType = rawSrc.split("?")[0].toLowerCase();
        source.src  = rawSrc;
        source.type = srcForType.endsWith(".webm") ? "video/webm" : "video/mp4";
        videoEl.appendChild(source);

        (currentVideo.tracks || []).forEach((t) => {
          const track = document.createElement("track");
          track.kind = t.kind;
          track.label = t.label;
          track.srclang = t.srclang;
          track.src = t.src;
          if (t.default) track.default = true;
          videoEl.appendChild(track);
        });

        qualityLabel.textContent = currentVideo.quality?.[0] || "Auto";
        buildQualityPills();
        setupNotesForCurrent();
        setupQuizForCurrent();

        videoEl.load();
        const progressKey = `acadly-video-progress:${currentVideo.id}`;
        const saved = Number(localStorage.getItem(progressKey) || 0);
        if (saved && Number.isFinite(saved)) {
          videoEl.addEventListener("loadedmetadata", () => {
            if (saved < videoEl.duration - 10) videoEl.currentTime = saved;
          }, { once: true });
        }

        if (autoplay) {
          videoEl.play().then(syncPlayIcon).catch(syncPlayIcon);
        } else {
          syncPlayIcon();
        }
      }

      function buildQualityPills() {
        const box = $("#qualityPills");
        box.innerHTML = "";
        (currentVideo.quality || []).forEach((q, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = q;
          btn.className = "rounded-full px-2 py-1 text-[11px] " + (idx === 0 ? "bg-cyan-500/20 text-cyan-200 ring-1 ring-cyan-400/80" : "bg-slate-800 text-slate-200");
          btn.addEventListener("click", () => {
            qualityLabel.textContent = q;
          });
          box.appendChild(btn);
        });
      }

      function syncPlayIcon() {
        const isPaused = videoEl.paused || videoEl.ended;
        iconPlay.classList.toggle("hidden", !isPaused);
        iconPause.classList.toggle("hidden", isPaused);
      }

      btnPlayPause.addEventListener("click", () => {
        if (videoEl.paused) videoEl.play().then(syncPlayIcon).catch(syncPlayIcon);
        else {
          videoEl.pause();
          syncPlayIcon();
        }
      });
      videoEl.addEventListener("play", syncPlayIcon);
      videoEl.addEventListener("pause", syncPlayIcon);

      btnBack10.addEventListener("click", () => {
        videoEl.currentTime = Math.max(0, videoEl.currentTime - 10);
      });
      btnFwd10.addEventListener("click", () => {
        videoEl.currentTime = Math.min(videoEl.duration || videoEl.currentTime + 10, videoEl.currentTime + 10);
      });
      btnPrev.addEventListener("click", () => setVideoIndex(currentIndex - 1, true));
      btnNext.addEventListener("click", () => setVideoIndex(currentIndex + 1, true));

      videoEl.addEventListener("timeupdate", () => {
        if (!videoEl.duration) return;
        currentTimeEl.textContent = formatTime(videoEl.currentTime);
        durationEl.textContent = formatTime(videoEl.duration);
        const pct = (videoEl.currentTime / videoEl.duration) * 100;
        progressBar.style.width = pct + "%";
        progressInput.value = pct;
        if (currentVideo && videoEl.currentTime > 5) {
          const key = `acadly-video-progress:${currentVideo.id}`;
          if (videoEl.currentTime < videoEl.duration - 10) localStorage.setItem(key, String(videoEl.currentTime));
          else localStorage.removeItem(key);
        }
      });
      progressInput.addEventListener("input", (e) => {
        if (!videoEl.duration) return;
        videoEl.currentTime = (Number(e.target.value) / 100) * videoEl.duration;
      });

      btnSettings.addEventListener("click", (e) => {
        e.stopPropagation();
        const next = settingsMenu.getAttribute("data-open") !== "true";
        settingsMenu.setAttribute("data-open", String(next));
      });
      document.addEventListener("click", () => settingsMenu.setAttribute("data-open", "false"));

      $$(".speed-pill").forEach((btn) => {
        btn.addEventListener("click", () => {
          const speed = Number(btn.dataset.speed) || 1;
          videoEl.playbackRate = speed;
          speedLabel.textContent = `${speed.toFixed(2).replace(/\.00$/, ".0")}x`;
        });
      });

      $$(".subtitle-pill").forEach((btn) => {
        btn.addEventListener("click", () => {
          const mode = btn.dataset.subtitle;
          subtitleLabel.textContent = mode === "off" ? "Off" : "English";
          const tracks = videoEl.textTracks || [];
          for (let i = 0; i < tracks.length; i++) tracks[i].mode = mode === "off" ? "disabled" : "showing";
        });
      });

      // window controls
      btnMinimize.addEventListener("click", () => {
        const collapsed = playerShell.style.maxHeight === "80px";
        playerShell.style.maxHeight = collapsed ? "" : "80px";
      });
      btnFloat.addEventListener("click", () => playerShell.classList.toggle("floating"));
      btnClosePlayer.addEventListener("click", () => {
        videoEl.pause();
        playerShell.style.display = "none";
      });

      function setupNotesForCurrent() {
        if (!currentVideo) return;
        const cfg = window.ACADLY_VIDEO_ENHANCEMENTS?.notes?.[currentVideo.id] || [];
        notesTitle.textContent = currentVideo.title;
        notesList.innerHTML = "";
        const key = `acadly-video-notes:${currentVideo.id}`;
        const stored = JSON.parse(localStorage.getItem(key) || "[]");
        cfg.forEach((text, idx) => {
          const done = stored.includes(idx);
          const row = document.createElement("button");
          row.type = "button";
          row.className = "flex w-full items-start gap-2 rounded-xl border border-slate-700/70 bg-slate-900/70 p-2 text-left text-[11px] " + (done ? "opacity-80" : "");
          row.innerHTML = `<span class="mt-0.5 h-3 w-3 rounded-full border ${done ? "border-emerald-400 bg-emerald-500/40" : "border-slate-500 bg-slate-900"}"></span><span class="flex-1">${text}</span>`;
          row.addEventListener("click", () => {
            const list = new Set(JSON.parse(localStorage.getItem(key) || "[]"));
            if (list.has(idx)) list.delete(idx);
            else list.add(idx);
            localStorage.setItem(key, JSON.stringify(Array.from(list)));
            setupNotesForCurrent();
          });
          notesList.appendChild(row);
        });
      }
      btnNotes.addEventListener("click", () => {
        const open = !notesDrawer.style.transform || notesDrawer.style.transform.includes("130%");
        notesDrawer.style.transform = open ? "translateY(0)" : "translateY(130%)";
      });
      notesClose.addEventListener("click", () => (notesDrawer.style.transform = "translateY(130%)"));

      const QUIZ_OPT_DEFAULT  = "quiz-opt w-full rounded-xl border border-slate-700 bg-slate-800/60 p-2 text-left text-xs text-slate-100 cursor-pointer transition-all hover:border-slate-500 hover:bg-slate-700/60";
      const QUIZ_OPT_SELECTED = "quiz-opt w-full rounded-xl border border-cyan-400 bg-cyan-500/20 p-2 text-left text-xs text-cyan-100 font-medium cursor-pointer transition-all ring-1 ring-cyan-400/30";

      function setupQuizForCurrent() {
        currentQuizSelection = null;
        quizOverlay.classList.add("hidden");
        quizMessage.textContent = "";
        quizOptions.innerHTML = "";
        if (!currentVideo) return;
        const cfg = window.ACADLY_VIDEO_ENHANCEMENTS?.quizzes?.[currentVideo.id];
        if (!cfg) return;
        quizQuestion.textContent = cfg.question;
        cfg.options.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = QUIZ_OPT_DEFAULT;
          btn.textContent = opt;
          btn.addEventListener("click", () => {
            // Deselect all, then highlight the chosen option
            quizOptions.querySelectorAll(".quiz-opt").forEach((b) => (b.className = QUIZ_OPT_DEFAULT));
            btn.className = QUIZ_OPT_SELECTED;
            currentQuizSelection = idx;
            quizMessage.textContent = "";
          });
          quizOptions.appendChild(btn);
        });
      }
      function showQuizOverlay() {
        quizOverlay.classList.remove("hidden");
        quizOverlay.classList.add("flex");
      }
      quizSkip.addEventListener("click", () => {
        quizOverlay.classList.add("hidden");
        quizOverlay.classList.remove("flex");
        if (currentIndex < playlist.length - 1) setVideoIndex(currentIndex + 1, true);
      });
      quizSubmit.addEventListener("click", async () => {
        if (currentQuizSelection == null || !currentVideo) {
          quizMessage.textContent = "Pick an option first.";
          return;
        }
        const cfg = window.ACADLY_VIDEO_ENHANCEMENTS?.quizzes?.[currentVideo.id];
        if (!cfg) return;
        if (currentQuizSelection === cfg.correctIndex) {
          quizMessage.textContent = "Correct. XP awarded.";
          try {
            await fetch("/api/progress/video-complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ videoId: currentVideo.id }),
            });
          } catch {}
          setTimeout(() => {
            quizOverlay.classList.add("hidden");
            quizOverlay.classList.remove("flex");
            if (currentIndex < playlist.length - 1) setVideoIndex(currentIndex + 1, true);
          }, 700);
        } else {
          quizMessage.textContent = "Not quite. Try again.";
        }
      });
      videoEl.addEventListener("ended", () => {
        if (currentVideo && window.ACADLY_VIDEO_ENHANCEMENTS?.quizzes?.[currentVideo.id]) showQuizOverlay();
        else if (currentIndex < playlist.length - 1) setVideoIndex(currentIndex + 1, true);
      });

      loadPlaylist();
    </script>
  </body>
</html>
