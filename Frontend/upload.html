<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acadly — Upload Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-3xl px-4 py-10">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-xl">
        <h1 class="text-2xl font-semibold text-cyan-300">Upload video to Acadly</h1>
        <p class="mt-2 text-sm text-slate-300">
          This page uploads your video to the server's <code class="rounded bg-slate-800 px-1">Videos/</code>
          folder and stores metadata in MongoDB.
        </p>

        <form id="uploadForm" class="mt-6 space-y-4">
          <div>
            <label class="mb-1 block text-sm font-medium">Video file</label>
            <input
              id="video"
              name="video"
              type="file"
              accept="video/*"
              required
              class="block w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
            />
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="mb-1 block text-sm font-medium">Title</label>
              <input name="title" type="text" class="block w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Category</label>
              <input name="category" type="text" value="General" class="block w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </div>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="mb-1 block text-sm font-medium">Topic</label>
              <input name="topic" type="text" class="block w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">XP Reward</label>
              <input name="xpReward" type="number" min="0" value="25" class="block w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </div>
          </div>

          <div>
            <label class="mb-1 block text-sm font-medium">Description</label>
            <textarea name="description" rows="4" class="block w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm"></textarea>
          </div>

          <button type="submit" class="rounded-lg bg-cyan-500 px-4 py-2 font-semibold text-slate-950 hover:bg-cyan-400">
            Upload video
          </button>
        </form>

        <div id="status" class="mt-4 rounded-lg border border-slate-800 bg-slate-950 p-3 text-sm text-slate-300">
          Waiting for upload…
        </div>
      </div>
    </main>

    <script>
      const form = document.getElementById("uploadForm");
      const statusBox = document.getElementById("status");

      function setStatus(message, tone = "info") {
        const tones = {
          info: "border-slate-800 text-slate-300",
          success: "border-emerald-700 text-emerald-300",
          error: "border-red-700 text-red-300",
        };
        statusBox.className = `mt-4 rounded-lg bg-slate-950 p-3 text-sm ${tones[tone] || tones.info}`;
        statusBox.textContent = message;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const fileInput = document.getElementById("video");
        if (!fileInput.files.length) {
          setStatus("Please choose a video file first.", "error");
          return;
        }

        const formData = new FormData(form);
        setStatus("Uploading video… please wait.");

        try {
          const response = await fetch("/api/videos/upload", {
            method: "POST",
            body: formData,
          });

          const result = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(result.detail || result.error || "Upload failed");
          }

          setStatus(`Upload complete. Video ID: ${result.id}`, "success");
          form.reset();
        } catch (error) {
          setStatus(`Upload failed: ${error.message}`, "error");
        }
      });
    </script>
  </body>
</html>
