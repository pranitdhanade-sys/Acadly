<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Lab</title>
  <link rel="stylesheet" href="CSS/practicallab.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Practice Lab</h1>
      <p class="muted">Generate dynamic tests from the question bank, submit answers, and review explanations + analytics.</p>

      <div class="grid two">
        <label>
          User ID
          <input id="userId" type="text" value="demo-user" />
        </label>
        <label>
          Number of Questions
          <input id="questionCount" type="number" min="1" max="100" value="5" />
        </label>
      </div>

      <fieldset>
        <legend>Topics</legend>
        <div id="topicFilters" class="chips"></div>
      </fieldset>

      <fieldset>
        <legend>Difficulty Distribution</legend>
        <div class="grid three">
          <label>Easy <input id="easyRatio" type="number" min="0" step="0.1" value="0.3" /></label>
          <label>Medium <input id="mediumRatio" type="number" min="0" step="0.1" value="0.4" /></label>
          <label>Hard <input id="hardRatio" type="number" min="0" step="0.1" value="0.3" /></label>
        </div>
      </fieldset>

      <div class="grid two">
        <label>
          <input id="timed" type="checkbox" />
          Timed Test
        </label>
        <label>
          Duration (minutes)
          <input id="durationMinutes" type="number" min="5" max="180" value="30" />
        </label>
      </div>

      <div class="actions">
        <button id="generateBtn" type="button">Generate Test</button>
        <button id="historyBtn" type="button" class="ghost">Load History</button>
        <button id="analyticsBtn" type="button" class="ghost">Load Analytics</button>
      </div>
    </section>

    <section id="testSection" class="card" hidden>
      <h2>Generated Test</h2>
      <p id="testMeta" class="muted"></p>
      <div id="timerText" class="timer"></div>
      <form id="testForm"></form>
      <button id="submitBtn" type="button">Submit Answers</button>
    </section>

    <section id="resultSection" class="card" hidden>
      <h2>Result</h2>
      <pre id="resultSummary"></pre>
      <div id="breakdown"></div>
    </section>

    <section class="card">
      <h2>History</h2>
      <pre id="historyOutput">No history loaded.</pre>
    </section>

    <section class="card">
      <h2>Analytics</h2>
      <pre id="analyticsOutput">No analytics loaded.</pre>
    </section>
  </main>

  <script>
    const topicFilters = document.getElementById("topicFilters");
    const generateBtn = document.getElementById("generateBtn");
    const submitBtn = document.getElementById("submitBtn");
    const testSection = document.getElementById("testSection");
    const resultSection = document.getElementById("resultSection");
    const testMeta = document.getElementById("testMeta");
    const timerText = document.getElementById("timerText");
    const testForm = document.getElementById("testForm");
    const resultSummary = document.getElementById("resultSummary");
    const breakdown = document.getElementById("breakdown");
    const historyBtn = document.getElementById("historyBtn");
    const analyticsBtn = document.getElementById("analyticsBtn");
    const historyOutput = document.getElementById("historyOutput");
    const analyticsOutput = document.getElementById("analyticsOutput");

    let activeTestId = null;
    let activeQuestions = [];
    let intervalId = null;

    async function loadTopics() {
      const response = await fetch("/api/practice-lab/questions");
      const payload = await response.json();
      const topics = [...new Set((payload.questions || []).map((q) => q.topic))].sort();

      topicFilters.innerHTML = topics.map((topic) => `
        <label class="chip"><input type="checkbox" value="${topic}" checked /> ${topic}</label>
      `).join("");
    }

    function selectedTopics() {
      return [...topicFilters.querySelectorAll('input[type="checkbox"]:checked')].map((el) => el.value);
    }

    function clearTimer() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      timerText.textContent = "";
    }

    function startCountdown(expiresAt) {
      if (!expiresAt) return;
      clearTimer();

      intervalId = setInterval(() => {
        const remainingMs = expiresAt - Date.now();
        if (remainingMs <= 0) {
          timerText.textContent = "Time is up. Submit may fail if session expired.";
          clearTimer();
          return;
        }

        const mins = Math.floor(remainingMs / 60000);
        const secs = Math.floor((remainingMs % 60000) / 1000);
        timerText.textContent = `Time left: ${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }, 1000);
    }

    function renderQuestions(questions) {
      activeQuestions = questions;
      testForm.innerHTML = questions.map((q, i) => {
        if (q.type === "mcq") {
          const options = (q.options || []).map((option, idx) => `
            <label class="option">
              <input type="radio" name="q_${q.id}" value="${option}" ${idx === 0 ? "" : ""} />
              ${option}
            </label>
          `).join("");

          return `
            <article class="question">
              <h3>Q${i + 1}. ${q.prompt}</h3>
              <p class="muted">${q.topic} • ${q.difficulty} • weight ${q.weight}</p>
              ${options}
            </article>
          `;
        }

        if (q.type === "coding") {
          return `
            <article class="question">
              <h3>Q${i + 1}. ${q.prompt}</h3>
              <p class="muted">${q.topic} • ${q.difficulty} • weight ${q.weight}</p>
              <p class="muted">Function: ${q.coding?.functionName || "N/A"}</p>
              <textarea name="q_${q.id}" rows="8">${q.coding?.starterCode || ""}</textarea>
            </article>
          `;
        }

        return `
          <article class="question">
            <h3>Q${i + 1}. ${q.prompt}</h3>
            <p class="muted">${q.topic} • ${q.difficulty} • weight ${q.weight}</p>
            <textarea name="q_${q.id}" rows="4" placeholder="Write your answer"></textarea>
          </article>
        `;
      }).join("");
    }

    async function generateTest() {
      const payload = {
        userId: document.getElementById("userId").value.trim() || "anonymous",
        questionCount: Number(document.getElementById("questionCount").value),
        topics: selectedTopics(),
        timed: document.getElementById("timed").checked,
        durationMinutes: Number(document.getElementById("durationMinutes").value),
        difficultyDistribution: {
          easy: Number(document.getElementById("easyRatio").value),
          medium: Number(document.getElementById("mediumRatio").value),
          hard: Number(document.getElementById("hardRatio").value),
        },
      };

      const response = await fetch("/api/practice-lab/generate-test", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "Failed to generate test.");
      }

      activeTestId = data.testId;
      testMeta.textContent = `Test ${data.testId} • ${data.generatedCount}/${data.requestedCount} questions`;
      renderQuestions(data.questions || []);
      testSection.hidden = false;
      resultSection.hidden = true;
      startCountdown(data.expiresAt);
    }

    function collectAnswers() {
      return activeQuestions.map((q) => {
        const inputName = `q_${q.id}`;
        if (q.type === "mcq") {
          const checked = document.querySelector(`input[name="${inputName}"]:checked`);
          return { questionId: q.id, answer: checked ? checked.value : "" };
        }

        const field = testForm.querySelector(`[name="${inputName}"]`);
        return { questionId: q.id, answer: field ? field.value : "" };
      });
    }

    async function submitTest() {
      if (!activeTestId) return alert("Generate a test first.");

      const payload = {
        testId: activeTestId,
        userId: document.getElementById("userId").value.trim() || "anonymous",
        answers: collectAnswers(),
      };

      const response = await fetch("/api/practice-lab/evaluate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Evaluation failed.");
      }

      clearTimer();
      activeTestId = null;
      resultSection.hidden = false;
      resultSummary.textContent = JSON.stringify(data.summary, null, 2) + `\nAdaptive next level: ${data.adaptiveRecommendation}`;
      breakdown.innerHTML = (data.breakdown || []).map((item) => `
        <article class="result-item">
          <h4>${item.questionId}</h4>
          <p><strong>Score:</strong> ${item.score}/${item.maxScore} • ${item.correct ? "Correct" : "Incorrect"}</p>
          <p><strong>Feedback:</strong> ${Array.isArray(item.feedback) ? item.feedback.join(" | ") : item.feedback}</p>
          <p><strong>Explanation:</strong> ${item.explanation}</p>
        </article>
      `).join("");
    }

    async function loadHistory() {
      const userId = document.getElementById("userId").value.trim() || "anonymous";
      const response = await fetch(`/api/practice-lab/history/${encodeURIComponent(userId)}`);
      const data = await response.json();
      historyOutput.textContent = JSON.stringify(data, null, 2);
    }

    async function loadAnalytics() {
      const userId = document.getElementById("userId").value.trim() || "anonymous";
      const response = await fetch(`/api/practice-lab/analytics/${encodeURIComponent(userId)}`);
      const data = await response.json();
      analyticsOutput.textContent = JSON.stringify(data, null, 2);
    }

    generateBtn.addEventListener("click", async () => {
      generateBtn.disabled = true;
      try {
        await generateTest();
      } catch (error) {
        alert(error.message);
      } finally {
        generateBtn.disabled = false;
      }
    });

    submitBtn.addEventListener("click", async () => {
      submitBtn.disabled = true;
      try {
        await submitTest();
      } catch (error) {
        alert(error.message);
      } finally {
        submitBtn.disabled = false;
      }
    });

    historyBtn.addEventListener("click", loadHistory);
    analyticsBtn.addEventListener("click", loadAnalytics);

    loadTopics().catch((error) => {
      topicFilters.innerHTML = `<p class="muted">Failed to load topics: ${error.message}</p>`;
    });
  </script>
</body>
</html>
