<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practical Lab (CTF Style)</title>
  <link rel="stylesheet" href="CSS/practicallab.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Practical Lab (CTF Style)</h1>
      <p>
        Docker and Kubernetes hands-on CTF labs. Start a machine, solve objectives,
        and submit the captured flag in <strong>PTL{...}</strong> format.
      </p>
    </section>

    <section class="toolbar">
      <input id="search" placeholder="Search by machine, tag, or keyword" />
      <select id="track">
        <option value="all">All Tracks</option>
        <option value="docker">Docker</option>
        <option value="kubernetes">Kubernetes</option>
      </select>
      <select id="difficulty">
        <option value="all">All Difficulties</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button class="primary" id="refresh" type="button">Refresh Machines</button>
    </section>

    <section class="grid" id="machineGrid"></section>

    <section class="panel-wrap" id="panelWrap" hidden>
      <article class="lab-panel" id="labPanel"></article>
    </section>
  </main>

  <script>
    const grid = document.getElementById("machineGrid");
    const panelWrap = document.getElementById("panelWrap");
    const labPanel = document.getElementById("labPanel");

    const searchInput = document.getElementById("search");
    const trackSelect = document.getElementById("track");
    const difficultySelect = document.getElementById("difficulty");
    const refreshButton = document.getElementById("refresh");

    let currentSession = null;

    async function fetchMachines() {
      const params = new URLSearchParams({
        search: searchInput.value.trim(),
        track: trackSelect.value,
        difficulty: difficultySelect.value,
      });

      const response = await fetch(`/api/ptl/machines?${params.toString()}`);
      if (!response.ok) throw new Error("Could not load machines right now.");
      return response.json();
    }

    function renderMachines(payload) {
      if (!payload.machines.length) {
        grid.innerHTML = '<p class="muted">No machine matched this filter.</p>';
        return;
      }

      grid.innerHTML = payload.machines.map((machine) => `
        <article class="machine">
          <span class="pill">${machine.track}</span>
          <h3>${machine.name}</h3>
          <p>${machine.description}</p>
          <div class="meta">
            <span class="pill">${machine.difficulty}</span>
            <span class="pill">${machine.points} pts</span>
            <span class="pill">Solve rate: ${machine.solveRate}</span>
            <span class="pill">${machine.duration}</span>
          </div>
          <div class="meta">
            ${machine.tags.map((tag) => `<span class="pill">#${tag}</span>`).join("")}
          </div>
          <button class="primary" type="button" onclick="startMachine('${machine.id}')">Start Machine</button>
        </article>
      `).join("");
    }

    async function loadMachines() {
      try {
        const payload = await fetchMachines();
        renderMachines(payload);
      } catch (error) {
        grid.innerHTML = `<p>${error.message}</p>`;
      }
    }

    async function startMachine(machineId) {
      try {
        const response = await fetch("/api/ptl/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ machineId }),
        });

        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Unable to start machine.");

        currentSession = payload.instanceId;
        panelWrap.hidden = false;
        labPanel.innerHTML = `
          <h2>Active Session: ${payload.machine.name}</h2>
          <p class="muted">Instance <strong>${payload.instanceId}</strong> • Expires in ${payload.expiresIn}</p>
          <ul>${payload.machine.objectives.map((item) => `<li>${item}</li>`).join("")}</ul>
          <div class="connection">
            <strong>Connection:</strong> ${payload.connection.protocol}<br />
            <strong>Endpoint:</strong> ${payload.connection.endpoint}<br />
            <strong>User:</strong> ${payload.connection.username}<br />
            <strong>Password:</strong> ${payload.connection.password}<br />
            <span class="muted">Flag format: PTL{...}</span>
          </div>
          <div class="flag-box">
            <input id="flagInput" placeholder="Submit captured flag" />
            <button type="button" onclick="submitFlag()">Submit Flag</button>
          </div>
          <div id="status" class="muted"></div>
        `;
      } catch (error) {
        alert(error.message);
      }
    }

    async function submitFlag() {
      const flagInput = document.getElementById("flagInput");
      const status = document.getElementById("status");
      if (!flagInput || !currentSession) return;

      try {
        const response = await fetch("/api/ptl/submit-flag", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ instanceId: currentSession, flag: flagInput.value }),
        });

        const payload = await response.json();
        if (!response.ok) throw new Error(payload.message || payload.error || "Submission failed.");

        status.textContent = `${payload.message} +${payload.reward} XP`;
        status.className = "ok";
        currentSession = null;
        flagInput.value = "";
      } catch (error) {
        status.textContent = error.message;
        status.className = "muted";
      }
    }

    refreshButton.addEventListener("click", loadMachines);
    searchInput.addEventListener("input", loadMachines);
    trackSelect.addEventListener("change", loadMachines);
    difficultySelect.addEventListener("change", loadMachines);

    loadMachines();
    window.startMachine = startMachine;
    window.submitFlag = submitFlag;
  </script>
</body>
</html>
