<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write Blog | Acadly</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --brand: #22d3ee;
      --border: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 { margin: 0 0 10px; }

    .links { display: flex; gap: 10px; margin-bottom: 16px; }

    .btn {
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      background: #0284c7;
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 14px;
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: color-mix(in srgb, var(--card) 90%, black);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin: 9px 0 5px;
      color: #cbd5e1;
    }

    input, textarea, select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 10px;
      font: inherit;
    }

    textarea { min-height: 280px; resize: vertical; }

    .small { color: var(--muted); font-size: 0.85rem; margin-top: 8px; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--border);
      background: #0b1220;
      color: #dbeafe;
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .tab.active { border-color: var(--brand); color: #fff; }

    .editor {
      min-height: 280px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #0b1220;
      color: var(--text);
    }

    #richEditor[contenteditable="true"]:empty:before {
      content: attr(data-placeholder);
      color: #64748b;
    }

    #preview {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
      background: #020617;
    }

    #preview pre {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: auto;
      padding: 10px;
    }

    .tools { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    .tools button { background: #2563eb; }

    #metadataPreview {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      color: #cbd5e1;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Write a Blog</h1>
    <div class="links">
      <a class="btn" href="/blogs.html">Open Blog Page</a>
      <a class="btn" href="/Homepage.html">Home</a>
    </div>

    <section class="layout">
      <aside class="panel">
        <h2 style="margin-top: 0;">Blog Metadata</h2>
        <label for="title">Title</label>
        <input id="title" placeholder="Blog title" />

        <label for="author">Author</label>
        <input id="author" placeholder="Your name" />

        <label for="tags">Tags (comma separated)</label>
        <input id="tags" placeholder="math, ai, tutorial" />

        <label for="slug">Slug / File Name</label>
        <input id="slug" placeholder="example-my-first-blog" />

        <label for="excerpt">Short Excerpt</label>
        <textarea id="excerpt" style="min-height:90px" placeholder="One short summary line"></textarea>

        <div class="tools">
          <button id="generateBtn" class="btn" type="button">Generate Metadata + File</button>
          <button id="downloadBtn" class="btn" type="button">Download Blog File</button>
        </div>
        <div id="metadataPreview"></div>
        <p class="small">Store output in <strong>Frontend/blogs/</strong> and append metadata entry into <strong>Frontend/blogs/metadata.json</strong>.</p>
      </aside>

      <section class="panel">
        <h2 style="margin-top: 0;">Editor</h2>
        <div class="tabs">
          <button class="tab active" data-mode="markdown" type="button">Markdown</button>
          <button class="tab" data-mode="rich" type="button">Rich Text</button>
          <button class="tab" data-mode="latex" type="button">LaTeX</button>
        </div>

        <textarea id="markdownEditor" class="editor" placeholder="# Start writing in Markdown"></textarea>
        <div id="richEditor" class="editor" contenteditable="true" data-placeholder="Write rich text here" style="display:none;"></div>
        <textarea id="latexEditor" class="editor" placeholder="Type LaTeX, example: \\int_0^1 x^2 dx" style="display:none;"></textarea>

        <div class="tools">
          <button id="previewBtn" class="btn" type="button">Preview</button>
          <button id="boldBtn" class="btn" type="button">Bold</button>
          <button id="italicBtn" class="btn" type="button">Italic</button>
          <button id="h2Btn" class="btn" type="button">H2</button>
        </div>

        <div id="preview"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/js/blog-editor.js"></script>
</body>
</html>
