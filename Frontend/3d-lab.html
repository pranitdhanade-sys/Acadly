<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acadly 3D Lab - Interactive Model Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fadeIn 0.3s ease-out; }
      .glass-effect {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(34, 211, 238, 0.2);
      }
      model-viewer {
        --progress-bar-height: 5px;
        --progress-bar-color: #22d3ee;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.5); border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(34, 211, 238, 0.8); }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100">
    <!-- Floating background elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
      <div class="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
      <div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

    <main class="relative z-10 mx-auto grid max-w-7xl gap-6 px-4 py-8 lg:grid-cols-[380px,1fr]">
      <!-- SIDEBAR - Model List -->
      <section class="glass-effect rounded-2xl p-5 h-fit lg:sticky lg:top-8">
        <div class="mb-5 flex items-center justify-between gap-2">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center">
              <i class="fas fa-cube text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-300 to-purple-400 bg-clip-text text-transparent">3D Hub</h1>
          </div>
          <a href="3d-upload.html" class="flex items-center gap-1 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-600 px-3 py-2 text-xs font-bold text-white hover:shadow-lg hover:shadow-cyan-500/50 transition-all">
            <i class="fas fa-plus"></i> Upload
          </a>
        </div>

        <!-- Search and Filters -->
        <div class="space-y-3 mb-4">
          <input id="search" type="search" placeholder="🔍 Search models..." class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 transition" />
          
          <select id="categoryFilter" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-cyan-500 transition">
            <option value="">All Categories</option>
            <option value="anatomy">🧬 Anatomy</option>
            <option value="biology">🧪 Biology</option>
            <option value="architecture">🏛️ Architecture</option>
            <option value="mechanical">⚙️ Mechanical</option>
            <option value="nature">🌿 Nature</option>
            <option value="technology">🔬 Technology</option>
            <option value="other">Other</option>
          </select>

          <select id="sortBy" class="w-full rounded-lg bg-slate-900/50 border border-slate-700 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-cyan-500 transition">
            <option value="recent">Recent</option>
            <option value="popular">Popular</option>
            <option value="size">Size (Small→Large)</option>
            <option value="name">Name (A→Z)</option>
          </select>
        </div>

        <!-- Model List -->
        <div id="modelList" class="max-h-[75vh] space-y-2 overflow-y-auto pr-2 custom-scrollbar">
          <p class="text-center text-sm text-slate-400 py-8"><i class="fas fa-spinner animate-spin mr-2"></i> Loading models...</p>
        </div>
      </section>

      <!-- MAIN VIEWPORT -->
      <section class="glass-effect rounded-2xl p-5 flex flex-col">
        <!-- Header Info -->
        <div class="mb-4 pb-4 border-b border-slate-700">
          <div class="flex flex-col gap-3">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1">
                <h2 id="activeTitle" class="text-2xl font-bold bg-gradient-to-r from-cyan-300 to-purple-400 bg-clip-text text-transparent mb-1">Select a model to view</h2>
                <p id="activeDescription" class="text-sm text-slate-400">Choose a 3D model from the left panel to preview it in the viewer.</p>
              </div>
              <div id="modelStats" class="hidden bg-slate-800/50 rounded-lg px-3 py-2 text-xs space-y-1 text-slate-300">
                <p><span class="text-cyan-400">Format:</span> <span id="statFormat">—</span></p>
                <p><span class="text-cyan-400">Size:</span> <span id="statSize">—</span></p>
                <p><span class="text-cyan-400">Tags:</span> <span id="statTags">—</span></p>
              </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap gap-2">
              <button id="toggleRotate" class="flex items-center gap-2 rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-xs font-semibold transition-all">
                <i class="fas fa-compact-disc"></i> <span id="rotateText">Auto-Rotate On</span>
              </button>
              <button id="toggleLighting" class="flex items-center gap-2 rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-xs font-semibold transition-all">
                <i class="fas fa-lightbulb"></i> <span id="lightingText">Lighting</span>
              </button>
              <button id="toggleShadow" class="flex items-center gap-2 rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-xs font-semibold transition-all">
                <i class="fas fa-moon"></i> <span id="shadowText">Shadow Off</span>
              </button>
              <button id="resetView" class="flex items-center gap-2 rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-xs font-semibold transition-all">
                <i class="fas fa-redo"></i> Reset View
              </button>
              <button id="fullscreenBtn" class="flex items-center gap-2 rounded-lg bg-slate-800 hover:bg-slate-700 px-3 py-2 text-xs font-semibold transition-all ml-auto">
                <i class="fas fa-expand"></i> Fullscreen
              </button>
              <a id="downloadModel" href="#" download class="flex items-center gap-2 rounded-lg bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 px-3 py-2 text-xs font-bold text-white transition-all">
                <i class="fas fa-download"></i> Download
              </a>
            </div>
          </div>
        </div>

        <!-- Status and Viewer -->
        <p id="viewerStatus" class="mb-3 text-xs text-slate-400 flex items-center gap-2">
          <i class="fas fa-check-circle text-emerald-400"></i> Viewer ready. Select a model to begin.
        </p>

        <div id="viewerContainer" class="flex-1 overflow-hidden rounded-xl border border-slate-700 bg-slate-950 relative">
          <model-viewer
            id="viewer"
            src=""
            alt="3D model preview"
            camera-controls
            touch-action="pan-y"
            shadow-intensity="0"
            exposure="1"
            auto-rotate
            loading="lazy"
            style="width:100%;height:100%;background:radial-gradient(ellipse at center, #1a1f3a 0%, #0f1729 100%);"
          ></model-viewer>
          <div id="loadingOverlay" class="hidden absolute inset-0 flex items-center justify-center bg-slate-950/50 backdrop-blur">
            <div class="text-center">
              <div class="w-12 h-12 rounded-full border-4 border-slate-700 border-t-cyan-500 animate-spin mx-auto mb-3"></div>
              <p class="text-sm text-slate-300">Loading 3D model...</p>
            </div>
          </div>
        </div>

        <!-- Info Footer -->
        <div class="mt-4 pt-4 border-t border-slate-700">
          <p class="text-xs text-slate-500 flex items-center gap-2">
            <i class="fas fa-mouse"></i> Drag to rotate • <i class="fas fa-scroll"></i> Scroll to zoom • Right-click to pan
          </p>
        </div>
      </section>
    </main>

    <script>
      const listEl = document.getElementById("modelList");
      const searchEl = document.getElementById("search");
      const categoryFilterEl = document.getElementById("categoryFilter");
      const sortByEl = document.getElementById("sortBy");
      const viewerEl = document.getElementById("viewer");
      const titleEl = document.getElementById("activeTitle");
      const descEl = document.getElementById("activeDescription");
      const downloadEl = document.getElementById("downloadModel");
      const toggleRotateBtn = document.getElementById("toggleRotate");
      const toggleLightingBtn = document.getElementById("toggleLighting");
      const toggleShadowBtn = document.getElementById("toggleShadow");
      const resetViewBtn = document.getElementById("resetView");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const viewerStatusEl = document.getElementById("viewerStatus");
      const modelStatsEl = document.getElementById("modelStats");
      const loadingOverlay = document.getElementById("loadingOverlay");

      const VIEWABLE_FORMATS = new Set(["glb", "gltf"]);
      let models = [];
      let filteredModels = [];
      let autoRotateEnabled = true;
      let shadowEnabled = false;
      let activeModelId = null;
      let filterRaf = null;

      function bytesToSize(bytes = 0) {
        const size = Number(bytes);
        if (!size) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const exp = Math.min(Math.floor(Math.log(size) / Math.log(1024)), units.length - 1);
        return `${(size / 1024 ** exp).toFixed(exp === 0 ? 0 : 2)} ${units[exp]}`;
      }

      function setActiveModel(model) {
        if (!model || model.id === activeModelId) return;

        const format = String(model.format || "").toLowerCase();
        const modelUrl = new URL(model.path, window.location.origin).href;
        activeModelId = model.id;

        titleEl.textContent = model.title;
        descEl.textContent = model.description || "No description available.";
        downloadEl.href = model.downloadUrl || modelUrl;
        downloadEl.setAttribute("download", model.fileName || `${model.title}.${format}`);

        // Show stats
        document.getElementById("statFormat").textContent = format.toUpperCase();
        document.getElementById("statSize").textContent = bytesToSize(model.fileSize);
        document.getElementById("statTags").textContent = (model.tags || []).slice(0, 3).join(", ") || "No tags";
        modelStatsEl.classList.remove("hidden");

        if (!VIEWABLE_FORMATS.has(format)) {
          viewerEl.src = "";
          viewerStatusEl.innerHTML = `<i class="fas fa-info-circle text-amber-400"></i> Preview unavailable for ${format.toUpperCase()}. Download to view.`;
          loadingOverlay.classList.add("hidden");
          return;
        }

        loadingOverlay.classList.remove("hidden");
        viewerStatusEl.innerHTML = `<i class="fas fa-spinner animate-spin text-cyan-400"></i> Loading model preview...`;
        viewerEl.src = modelUrl;
      }

      function renderList() {
        if (!filteredModels.length) {
          listEl.innerHTML = '<p class="text-center text-sm text-slate-400 py-8"><i class="fas fa-inbox"></i> No models found.</p>';
          return;
        }

        listEl.innerHTML = filteredModels
          .map(
            (model, idx) => `
              <button
                type="button"
                data-id="${model.id}"
                class="fade-in w-full rounded-lg border border-slate-700 hover:border-cyan-500/60 bg-slate-900/50 hover:bg-slate-800/80 p-3 text-left transition-all group"
                style="animation-delay: ${idx * 50}ms"
              >
                <div class="flex items-start gap-3">
                  <div class="w-8 h-8 rounded-md bg-gradient-to-br from-cyan-400/30 to-purple-600/30 flex items-center justify-center flex-shrink-0 group-hover:from-cyan-400/60 group-hover:to-purple-600/60 transition">
                    <i class="fas fa-cube text-xs text-cyan-300"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="font-semibold text-slate-100 group-hover:text-cyan-300 transition truncate">${model.title}</p>
                    <p class="mt-1 text-xs text-slate-500">${model.format.toUpperCase()} • ${bytesToSize(model.fileSize)}</p>
                    <p class="mt-1 line-clamp-1 text-xs text-slate-400">${model.description || "No description"}</p>
                  </div>
                </div>
              </button>
            `
          )
          .join("");
      }

      function applyFilters() {
        const query = searchEl.value.trim().toLowerCase();
        const category = categoryFilterEl.value;
        const sortBy = sortByEl.value;

        let filtered = models.filter((model) => {
          const blob = `${model.title} ${model.description || ""} ${(model.tags || []).join(" ")}`.toLowerCase();
          const matchesQuery = !query || blob.includes(query);
          const matchesCategory = !category || (model.category === category || (model.tags || []).includes(category));
          return matchesQuery && matchesCategory;
        });

        // Sort
        if (sortBy === "name") filtered.sort((a, b) => a.title.localeCompare(b.title));
        else if (sortBy === "size") filtered.sort((a, b) => (a.fileSize || 0) - (b.fileSize || 0));
        else if (sortBy === "popular") filtered.sort((a, b) => (b.views || 0) - (a.views || 0));

        filteredModels = filtered;
        renderList();
      }

      // Event Listeners
      listEl.addEventListener("click", (event) => {
        const target = event.target.closest("button[data-id]");
        if (!target) return;
        const selected = models.find((model) => model.id === target.dataset.id);
        if (!selected) return;
        setActiveModel(selected);
      });

      searchEl.addEventListener("input", () => {
        if (filterRaf) cancelAnimationFrame(filterRaf);
        filterRaf = requestAnimationFrame(() => {
          applyFilters();
          filterRaf = null;
        });
      });
      categoryFilterEl.addEventListener("change", applyFilters);
      sortByEl.addEventListener("change", applyFilters);

      toggleRotateBtn.addEventListener("click", () => {
        autoRotateEnabled = !autoRotateEnabled;
        if (autoRotateEnabled) {
          viewerEl.setAttribute("auto-rotate", "");
          document.getElementById("rotateText").textContent = "Auto-Rotate On";
        } else {
          viewerEl.removeAttribute("auto-rotate");
          document.getElementById("rotateText").textContent = "Auto-Rotate Off";
        }
      });

      toggleLightingBtn.addEventListener("click", () => {
        const exposure = parseFloat(viewerEl.getAttribute("exposure") || 1);
        const newExposure = exposure === 1 ? 0.7 : 1;
        viewerEl.setAttribute("exposure", newExposure);
        document.getElementById("lightingText").textContent = exposure === 1 ? "Lighting (Dim)" : "Lighting";
      });

      toggleShadowBtn.addEventListener("click", () => {
        const intensity = parseFloat(viewerEl.getAttribute("shadow-intensity") || 1);
        const newIntensity = intensity === 1 ? 0 : 1;
        viewerEl.setAttribute("shadow-intensity", newIntensity);
        shadowEnabled = newIntensity === 1;
        document.getElementById("shadowText").textContent = newIntensity === 1 ? "Shadow On" : "Shadow Off";
      });

      resetViewBtn.addEventListener("click", () => {
        viewerEl.resetTurntable?.();
      });

      fullscreenBtn.addEventListener("click", () => {
        const container = document.getElementById("viewerContainer");
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          container.requestFullscreen?.();
        }
      });

      viewerEl.addEventListener("load", () => {
        loadingOverlay.classList.add("hidden");
        viewerStatusEl.innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i> Model loaded. Interact with it using mouse/touch.`;
      });

      viewerEl.addEventListener("error", () => {
        loadingOverlay.classList.add("hidden");
        viewerStatusEl.innerHTML = `<i class="fas fa-exclamation-triangle text-red-400"></i> Failed to load preview.`;
      });

      async function loadModels() {
        try {
          const response = await fetch("/api/models");
          const result = await response.json();
          if (!response.ok) throw new Error(result.error || "Failed to load models");

          models = Array.isArray(result) ? result : [];
          filteredModels = [...models];
          renderList();

          if (models.length) {
            setActiveModel(models[0]);
            viewerStatusEl.innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i> Select a model or drag/scroll to interact.`;
          } else {
            titleEl.textContent = "No Models Yet";
            descEl.textContent = "Upload your first 3D model to get started!";
            viewerStatusEl.innerHTML = `<i class="fas fa-inbox text-slate-500"></i> No models available. Upload from the Upload page.`;
          }
        } catch (error) {
          listEl.innerHTML = `<p class="rounded-lg border border-red-700 bg-red-900/20 p-3 text-sm text-red-300"><i class="fas fa-exclamation-circle"></i> Error: ${error.message}</p>`;
        }
      }

      loadModels();
    </script>
  </body>
</html>
