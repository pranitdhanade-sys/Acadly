<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acadly 3D Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto grid max-w-7xl gap-6 px-4 py-8 lg:grid-cols-[360px,1fr]">
      <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h1 class="text-xl font-semibold text-cyan-300">3D Model Hub</h1>
          <a href="3d-upload.html" class="rounded-lg border border-cyan-500 px-3 py-1 text-xs font-semibold text-cyan-300 hover:bg-cyan-500/10">Upload</a>
        </div>
        <input id="search" type="search" placeholder="Search models..." class="mb-3 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <div id="modelList" class="max-h-[75vh] space-y-2 overflow-auto pr-1"></div>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 id="activeTitle" class="text-lg font-semibold text-slate-100">Pick a model</h2>
            <p id="activeDescription" class="text-sm text-slate-300">Choose a model from the left panel to preview it.</p>
          </div>
          <div class="flex gap-2">
            <button id="toggleRotate" class="rounded-lg border border-slate-700 px-3 py-2 text-xs font-semibold">Toggle Auto-Rotate</button>
            <a id="downloadModel" href="#" download class="rounded-lg border border-emerald-600 px-3 py-2 text-xs font-semibold text-emerald-300">Download Model</a>
          </div>
        </div>

        <p id="viewerStatus" class="mb-3 text-xs text-slate-400">Viewer ready.</p>

        <div class="overflow-hidden rounded-xl border border-slate-800 bg-slate-950">
          <model-viewer
            id="viewer"
            src=""
            alt="3D model preview"
            camera-controls
            touch-action="pan-y"
            shadow-intensity="1"
            exposure="1"
            auto-rotate
            style="width:100%;height:65vh;background:#020617;"
          ></model-viewer>
        </div>
      </section>
    </main>

    <script>
      const listEl = document.getElementById("modelList");
      const searchEl = document.getElementById("search");
      const viewerEl = document.getElementById("viewer");
      const titleEl = document.getElementById("activeTitle");
      const descEl = document.getElementById("activeDescription");
      const downloadEl = document.getElementById("downloadModel");
      const toggleRotateBtn = document.getElementById("toggleRotate");
      const viewerStatusEl = document.getElementById("viewerStatus");

      const VIEWABLE_FORMATS = new Set(["glb", "gltf"]);

      let models = [];
      let filteredModels = [];

      function bytesToSize(bytes = 0) {
        const size = Number(bytes);
        if (!size) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const exp = Math.min(Math.floor(Math.log(size) / Math.log(1024)), units.length - 1);
        return `${(size / 1024 ** exp).toFixed(exp === 0 ? 0 : 2)} ${units[exp]}`;
      }

      function setActiveModel(model) {
        const format = String(model.format || "").toLowerCase();
        const modelUrl = new URL(model.path, window.location.origin).href;

        titleEl.textContent = model.title;
        descEl.textContent = model.description || `Format: ${format.toUpperCase()} | Size: ${bytesToSize(model.fileSize)}`;
        downloadEl.href = model.downloadUrl || modelUrl;
        downloadEl.setAttribute("download", model.fileName || `${model.title}.${format}`);

        if (!VIEWABLE_FORMATS.has(format)) {
          viewerEl.src = "";
          viewerStatusEl.textContent = `Preview is available for GLB/GLTF only. You can still download this ${format.toUpperCase()} file.`;
          return;
        }

        viewerStatusEl.textContent = "Loading model preview...";
        viewerEl.src = modelUrl;
        titleEl.textContent = model.title;
        descEl.textContent = model.description || `Format: ${model.format.toUpperCase()} | Size: ${bytesToSize(model.fileSize)}`;
        viewerEl.src = model.path;
        downloadEl.href = model.downloadUrl;
        downloadEl.setAttribute("download", model.fileName || `${model.title}.${model.format}`);
      }

      function renderList() {
        if (!filteredModels.length) {
          listEl.innerHTML = '<p class="rounded-lg border border-slate-800 p-3 text-sm text-slate-300">No models found.</p>';
          return;
        }

        listEl.innerHTML = filteredModels
          .map(
            (model) => `
              <button
                type="button"
                data-id="${model.id}"
                class="w-full rounded-lg border border-slate-800 bg-slate-950 p-3 text-left hover:border-cyan-500/60"
              >
                <p class="font-medium text-slate-100">${model.title}</p>
                <p class="mt-1 text-xs text-slate-400">${model.format.toUpperCase()} • ${bytesToSize(model.fileSize)}</p>
                <p class="mt-1 line-clamp-2 text-xs text-slate-300">${model.description || "No description"}</p>
              </button>
            `
          )
          .join("");
      }

      function runFilter() {
        const query = searchEl.value.trim().toLowerCase();
        filteredModels = models.filter((model) => {
          const blob = `${model.title} ${model.description || ""} ${(model.tags || []).join(" ")}`.toLowerCase();
          return blob.includes(query);
        });
        renderList();
      }

      listEl.addEventListener("click", (event) => {
        const target = event.target.closest("button[data-id]");
        if (!target) return;
        const selected = models.find((model) => model.id === target.dataset.id);
        if (!selected) return;
        setActiveModel(selected);
      });

      searchEl.addEventListener("input", runFilter);

      toggleRotateBtn.addEventListener("click", () => {
        if (viewerEl.hasAttribute("auto-rotate")) {
          viewerEl.removeAttribute("auto-rotate");
        } else {
          viewerEl.setAttribute("auto-rotate", "");
        }
      });

      viewerEl.addEventListener("load", () => {
        viewerStatusEl.textContent = "Model loaded. Drag to rotate, scroll to zoom.";
      });

      viewerEl.addEventListener("error", () => {
        viewerStatusEl.textContent = "Preview failed to load. Use download and verify model integrity/format.";
      });

      async function loadModels() {
        try {
          const response = await fetch("/api/models");
          const result = await response.json();
          if (!response.ok) throw new Error(result.error || "Could not load model list");

          models = Array.isArray(result) ? result : [];
          filteredModels = [...models];
          renderList();

          if (models.length) {
            setActiveModel(models[0]);
          } else {
            viewerStatusEl.textContent = "No models found yet. Upload one from the Upload page.";
          }
        } catch (error) {
          listEl.innerHTML = `<p class="rounded-lg border border-red-700 p-3 text-sm text-red-300">Failed to load models: ${error.message}</p>`;
        }
      }

      loadModels();
    </script>
  </body>
</html>
