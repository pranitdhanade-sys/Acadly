<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acadly Blogs</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --brand: #38bdf8;
      --chip: #1f2937;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 { margin: 0; font-size: 2rem; }

    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .search-wrap {
      margin: 18px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #search {
      flex: 1;
      min-width: 240px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: color-mix(in srgb, var(--card) 92%, black);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card h3 { margin: 0; }

    .meta {
      color: var(--muted);
      font-size: 0.86rem;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      background: var(--chip);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: #cbd5e1;
    }

    .excerpt {
      color: #d1d5db;
      line-height: 1.4;
      min-height: 56px;
    }

    .read-btn {
      margin-top: auto;
      width: fit-content;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .status { color: var(--muted); margin-top: 8px; }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      z-index: 50;
    }

    .modal.active { display: grid; }

    .modal-body {
      width: min(860px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #030712;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 12px;
      border: none;
      border-radius: 6px;
      padding: 6px 9px;
      cursor: pointer;
    }

    #blogContent {
      margin-top: 12px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    #blogContent pre {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: auto;
      padding: 10px;
    }

    #blogContent code { font-family: monospace; }
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Acadly Blog</h1>
      <div class="top-actions">
        <a class="btn" href="/Homepage.html">Home</a>
        <a class="btn" href="/blog-editor.html">Write a Blog</a>
      </div>
    </header>

    <div class="search-wrap">
      <input id="search" placeholder="Search by title, author, tag, or excerpt..." />
    </div>

    <section id="blogList" class="grid"></section>
    <p id="status" class="status"></p>
  </main>

  <section id="blogModal" class="modal" aria-hidden="true">
    <div class="modal-body">
      <button id="closeModal" class="close">Close</button>
      <h2 id="blogTitle"></h2>
      <div id="blogMeta" class="meta"></div>
      <article id="blogContent"></article>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/js/blogs.js"></script>
</body>
</html>
