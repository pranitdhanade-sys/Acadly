<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acadly Blogs - Community Knowledge Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="CSS/blogs.css">
  <style>
    /* Modern gradient background with animated elements */
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(34, 211, 238, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    /* Header with gradient text */
    .topbar h1 {
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      font-size: 2.5rem;
      letter-spacing: -0.5px;
    }

    /* Glass effect buttons */
    .btn {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 211, 238, 0.3);
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
      background: rgba(34, 211, 238, 0.15);
      border-color: rgba(34, 211, 238, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2);
    }

    /* Enhanced search bar */
    .search-wrap {
      margin: 24px 0;
      position: relative;
    }

    #search {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border-radius: 12px;
      border: 2px solid rgba(34, 211, 238, 0.2);
      background: rgba(15, 23, 42, 0.6);
      color: #e5e7eb;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    #search::placeholder {
      color: #9ca3af;
    }

    #search:focus {
      outline: none;
      border-color: #22d3ee;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
    }

    .search-wrap::before {
      content: '\f002';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #22d3ee;
      pointer-events: none;
    }

    /* Blog grid with enhanced cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 24px 0;
    }

    .card {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 211, 238, 0.15);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(34, 211, 238, 0.4);
      box-shadow: 
        0 20px 40px rgba(34, 211, 238, 0.15),
        0 0 40px rgba(139, 92, 246, 0.1);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card h3 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: #22d3ee;
      line-height: 1.3;
    }

    .meta {
      position: relative;
      z-index: 1;
      color: #cbd5e1;
      font-size: 0.9rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Tags styling */
    .tags {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag {
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #22d3ee;
      transition: all 0.2s ease;
    }

    .tag:hover {
      background: rgba(34, 211, 238, 0.25);
      border-color: rgba(34, 211, 238, 0.5);
    }

    /* Excerpt with gradient fade */
    .excerpt {
      position: relative;
      z-index: 1;
      color: #d1d5db;
      line-height: 1.5;
      min-height: 60px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Read button */
    .read-btn {
      position: relative;
      z-index: 1;
      margin-top: auto;
      width: 100%;
      background: linear-gradient(135deg, #0284c7, #2563eb);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .read-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 16px rgba(34, 211, 238, 0.3);
    }

    .read-btn:active {
      transform: scale(0.98);
    }

    /* Status message */
    .status {
      color: #a1a5b0;
      margin-top: 16px;
      text-align: center;
      font-style: italic;
      padding: 12px;
    }

    /* Modal styling */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      padding: 20px;
      z-index: 50;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal.active {
      display: grid;
    }

    .modal-body {
      width: min(900px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      color: #22d3ee;
      font-weight: 600;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }

    .close:hover {
      background: rgba(34, 211, 238, 0.25);
      border-color: rgba(34, 211, 238, 0.5);
    }

    #blogTitle {
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .modal-meta {
      color: #cbd5e1;
      font-size: 0.95rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.15);
    }

    .modal-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #blogContent {
      margin-top: 20px;
      line-height: 1.8;
      color: #e2e8f0;
      font-size: 1.05rem;
    }

    #blogContent h2, #blogContent h3 {
      color: #22d3ee;
      margin-top: 24px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    #blogContent p {
      margin-bottom: 14px;
    }

    #blogContent a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    #blogContent a:hover {
      color: #22d3ee;
      text-decoration: underline;
    }

    #blogContent pre {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 8px;
      overflow: auto;
      padding: 14px;
      margin: 14px 0;
    }

    #blogContent code {
      font-family: 'Courier New', monospace;
      background: rgba(34, 211, 238, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      color: #22d3ee;
    }

    #blogContent pre code {
      background: none;
      padding: 0;
      color: #e2e8f0;
    }

    /* Scrollbar styling for modal */
    .modal-body::-webkit-scrollbar {
      width: 8px;
    }

    .modal-body::-webkit-scrollbar-track {
      background: rgba(34, 211, 238, 0.05);
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: rgba(34, 211, 238, 0.3);
      border-radius: 4px;
    }

    .modal-body::-webkit-scrollbar-thumb:hover {
      background: rgba(34, 211, 238, 0.5);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .topbar h1 {
        font-size: 1.75rem;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      #blogTitle {
        font-size: 1.5rem;
      }

      .modal-body {
        padding: 20px;
      }
    }

    /* Dark mode enhancements */
    @media (prefers-color-scheme: dark) {
      body {
        color-scheme: dark;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Animated background elements -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
    <div class="absolute top-20 -left-20 w-72 h-72 bg-cyan-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 -right-20 w-72 h-72 bg-purple-500/10 rounded-full blur-3xl"></div>
  </div>

  <main class="container max-w-5xl mx-auto px-4 py-8 sm:py-12">
    <!-- Header Section -->
    <header class="topbar mb-8">
      <div class="flex-1">
        <h1 class="text-4xl sm:text-5xl font-black tracking-tight mb-2">
          <i class="fa-solid fa-book-open mr-3"></i>Acadly Blogs
        </h1>
        <p class="text-slate-400 text-lg">Discover insights from our community</p>
      </div>
      <div class="top-actions gap-3">
        <a class="btn px-4 py-2 sm:px-5 sm:py-2.5 rounded-lg font-semibold hover:shadow-lg transition-all" 
           href="Homepage.html">
          <i class="fa-solid fa-home mr-2"></i>Home
        </a>
        <a class="btn px-4 py-2 sm:px-5 sm:py-2.5 rounded-lg font-semibold hover:shadow-lg transition-all" 
           href="blog-editor.html">
          <i class="fa-solid fa-pen-to-square mr-2"></i>Write
        </a>
      </div>
    </header>

    <!-- Search Section -->
    <div class="search-wrap">
      <input id="search" 
             type="text"
             placeholder="Search blogs by title, author, tags..." 
             class="w-full" />
    </div>

    <!-- Blog Grid -->
    <section id="blogList" class="grid"></section>

    <!-- Status Message -->
    <p id="status" class="status"></p>
  </main>

  <!-- Blog Modal -->
  <section id="blogModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-body">
      <button id="closeModal" class="close" aria-label="Close blog">
        <i class="fa-solid fa-xmark mr-1"></i>Close
      </button>
      <h2 id="blogTitle"></h2>
      <div id="blogMeta" class="modal-meta"></div>
      <article id="blogContent" class="prose prose-invert max-w-none"></article>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="js/blogs.js"></script>
</body>
</html>
