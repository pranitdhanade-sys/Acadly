<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acadly Blogs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="CSS/blogs.css">
  
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Acadly Blog</h1>
      <div class="top-actions">
        <a class="btn" href="Homepage.html">Home</a>
        <a class="btn" href="blog-editor.html">Write a Blog</a>
      </div>
    </header>

    <div class="search-wrap">
      <input id="search" placeholder="Search by title, author, tag, or excerpt..." />
    </div>

    <section id="blogList" class="grid"></section>
    <p id="status" class="status"></p>
  </main>

  <section id="blogModal" class="modal" aria-hidden="true">
    <div class="modal-body">
      <button id="closeModal" class="close">Close</button>
      <h2 id="blogTitle"></h2>
      <div id="blogMeta" class="meta"></div>
      <article id="blogContent"></article>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="js/blogs.js"></script>
</body>
</html>
